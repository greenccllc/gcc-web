<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Client Dashboard · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="/assets/favicon.ico" sizes="any" /><link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
<link rel="stylesheet" href="/assets/css/site.css" />
  <link rel="stylesheet" href="/assets/css/chrome.css?v=20260501-design-pass" />
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi { background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 20px; box-shadow: var(--shadow-xs); }
.kpi .lbl { font-size: 12px; font-weight: 700; color: var(--slate-light); letter-spacing: 0.06em; text-transform: uppercase; }
.kpi .val { font-size: 28px; font-weight: 800; color: var(--forest); margin-top: 6px; line-height: 1; font-family: var(--font-display); letter-spacing: -0.01em; }
.kpi .delta { font-size: 12px; color: var(--slate); margin-top: 4px; }
.tbl { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); overflow: hidden; }
.tbl th { text-align: left; padding: 12px 14px; background: var(--paper); font-size: 12px; font-weight: 700; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--hairline); }
.tbl td { padding: 12px 14px; border-top: 1px solid var(--hairline); font-size: 14px; }
.tbl tr:hover td { background: rgba(30,77,43,0.03); }
.empty-state { background: white; border: 1px dashed var(--hairline-strong); border-radius: var(--r-md); padding: 40px 20px; text-align: center; color: var(--slate); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--slate); margin-bottom: 4px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid var(--hairline-strong); border-radius: var(--r-sm); font-size: 15px; font-family: inherit; background: var(--paper); }
.field input:focus { outline: none; border-color: var(--forest); background: white; box-shadow: 0 0 0 3px rgba(30,77,43,0.15); }
</style>
</head>
<body>

<div id="gcc-header"></div>

<section style="padding: 32px 0; background: var(--paper);">
  <div class="container">
    <h1 style="margin-bottom: 4px;">Welcome back</h1>
    <p style="color: var(--slate); margin: 0;">Your projects, estimates, and invoices in one place.</p>
  </div>
</section>

<section style="padding: 32px 0;">
  <div class="container">
    <div id="page-loading" style="text-align:center; padding: 40px; color: var(--slate-light);">Loading...</div>
    <div id="page-content" hidden>
<div class="dash-grid">
  <div class="kpi"><div class="lbl">Active Projects</div><div class="val" id="kpi-projects">0</div></div>
  <div class="kpi"><div class="lbl">Saved Estimates</div><div class="val" id="kpi-estimates">0</div></div>
  <div class="kpi"><div class="lbl">Open Invoices</div><div class="val" id="kpi-invoices">0</div><div class="delta">QB integration soon</div></div>
  <div class="kpi"><div class="lbl">Account</div><div class="val" id="kpi-name" style="font-size:18px;">--</div></div>
</div>
<h2 style="margin: 24px 0 12px;">Recent Estimates</h2>
<div id="recent-estimates"></div>
    </div>
  </div>
</section>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
  <script src="/assets/js/footer.js"></script>
<script src="/assets/js/page.js"></script>
<script>
gccPage.requireRole(["client","staff","admin"]).then(async (me) => {
  document.getElementById('page-loading').hidden = true;
  document.getElementById('page-content').hidden = false;
  document.getElementById('kpi-name').textContent = me.name || me.email;
  try {
    const ests = await gccApi.listMyEstimates();
    document.getElementById('kpi-estimates').textContent = ests.length;
    if (!ests.length) {
      document.getElementById('recent-estimates').innerHTML = '<div class="empty-state"><div class="es-icon">📋</div><div>No estimates yet. <a href="/clients/' + (me.clientType === 'residential' ? 'estimator-residential.html' : 'estimator.html') + '">Start one →</a></div></div>';
    } else {
      const rows = ests.slice(0,10).map(e => '<tr><td>' + gccPage.datetime(e.createdAt) + '</td><td>' + e.source + '</td><td>' + gccPage.money(e.estimateMid) + '</td></tr>').join('');
      document.getElementById('recent-estimates').innerHTML = '<table class="tbl"><thead><tr><th>Date</th><th>Type</th><th>Midpoint</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }
  } catch(e) { console.error(e); }
}).catch(() => { /* redirected */ });
</script>
  <div id="gcc-footer"></div>
</body>
</html>
