<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Client Portal · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231E4D2B'/%3E%3Ctext x='50' y='65' font-family='Helvetica' font-size='42' font-weight='800' fill='white' text-anchor='middle'%3EGC%3C/text%3E%3Ccircle cx='86' cy='14' r='8' fill='%23D4AF37'/%3E%3C/svg%3E" type="image/svg+xml" />
<link rel="stylesheet" href="/assets/css/site.css" />
</head>
<body class="login-page">

<div class="login-card">
  <a href="/" class="brand-mark">
    <span class="monogram">GC</span>
    <span class="brand-stack"><span class="brand-name">GCC LLC</span><span class="brand-tag">Div 27 / 28 Contractor</span></span>
  </a>
  <h1>Client Portal</h1>
  <p class="lead">Sign in to view your active projects, invoices, and closeout packages.</p>

  <form method="POST" action="/clients/login">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn btn-primary">Sign In →</button>
  </form>

  <div class="login-foot">
    <p style="margin: 0 0 8px;">Don't have an account yet? Once your project is awarded we'll send credentials to the email on your contract.</p>
    <p style="margin: 0;"><a href="/contact.html">Contact us</a> · <a href="/">← Back to site</a></p>
  </div>
</div>

</body>
</html>
