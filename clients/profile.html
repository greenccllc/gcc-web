<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="/assets/favicon.ico" sizes="any" /><link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
<link rel="stylesheet" href="/assets/css/site.css" />
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi { background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 20px; box-shadow: var(--shadow-xs); }
.kpi .lbl { font-size: 12px; font-weight: 700; color: var(--slate-light); letter-spacing: 0.06em; text-transform: uppercase; }
.kpi .val { font-size: 28px; font-weight: 800; color: var(--forest); margin-top: 6px; line-height: 1; font-family: var(--font-display); letter-spacing: -0.01em; }
.kpi .delta { font-size: 12px; color: var(--slate); margin-top: 4px; }
.tbl { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); overflow: hidden; }
.tbl th { text-align: left; padding: 12px 14px; background: var(--paper); font-size: 12px; font-weight: 700; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--hairline); }
.tbl td { padding: 12px 14px; border-top: 1px solid var(--hairline); font-size: 14px; }
.tbl tr:hover td { background: rgba(30,77,43,0.03); }
.empty-state { background: white; border: 1px dashed var(--hairline-strong); border-radius: var(--r-md); padding: 40px 20px; text-align: center; color: var(--slate); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--slate); margin-bottom: 4px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid var(--hairline-strong); border-radius: var(--r-sm); font-size: 15px; font-family: inherit; background: var(--paper); }
.field input:focus { outline: none; border-color: var(--forest); background: white; box-shadow: 0 0 0 3px rgba(30,77,43,0.15); }
</style>
</head>
<body>

<div id="gcc-header"></div>

<section style="padding: 32px 0; background: var(--paper);">
  <div class="container">
    <h1 style="margin-bottom: 4px;">Profile</h1>
    <p style="color: var(--slate); margin: 0;">Your contact info — used on estimates, invoices, and project comms.</p>
  </div>
</section>

<section style="padding: 32px 0;">
  <div class="container">
    <div id="page-loading" style="text-align:center; padding: 40px; color: var(--slate-light);">Loading...</div>
    <div id="page-content" hidden>
<div style="max-width: 640px; background: white; border: 1px solid var(--hairline); border-radius: 14px; padding: 32px; box-shadow: 0 1px 2px rgba(16,24,40,0.06);">
  <form id="profile-form">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="field"><label>Name</label><input type="text" name="Name" /></div>
      <div class="field"><label>Title</label><input type="text" name="Title" /></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="field"><label>Phone</label><input type="tel" name="Phone" /></div>
      <div class="field"><label>Company</label><input type="text" name="Company" /></div>
    </div>
    <div class="field">
      <label>Company address</label>
      <input type="text" name="CompanyAddress" class="addr-autocomplete"
             autocomplete="street-address"
             placeholder="Start typing — Google will autocomplete" />
    </div>
    <div class="field">
      <label>Billing address</label>
      <input type="text" name="BillingAddress" class="addr-autocomplete"
             autocomplete="street-address"
             placeholder="Start typing — Google will autocomplete" />
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="field"><label>EIN</label><input type="text" name="CompanyEin" /></div>
      <div class="field"><label>DUNS</label><input type="text" name="CompanyDuns" /></div>
    </div>
    <button type="submit" class="btn btn-primary" style="margin-top:16px;">Save changes</button>
    <span id="save-msg" style="margin-left:12px; font-size:14px; color:var(--slate);"></span>
  </form>
</div>
    </div>
  </div>
</section>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
<script src="/assets/js/page.js"></script>
<script src="/assets/js/address-autocomplete.js"></script>
<script>
gccPage.requireRole(["client","staff","admin"]).then(async (me) => {
  document.getElementById('page-loading').hidden = true;
  document.getElementById('page-content').hidden = false;
  const form = document.getElementById('profile-form');
  ['Name','Title','Phone','Company','CompanyAddress','BillingAddress','CompanyEin','CompanyDuns'].forEach(k => {
    const lc = k.charAt(0).toLowerCase() + k.slice(1);
    if (form[k] && me[lc] != null) form[k].value = me[lc] || '';
  });
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const data = {};
    new FormData(form).forEach((v,k) => { data[k] = v.toString().trim() || null; });
    const msg = document.getElementById('save-msg');
    msg.textContent = 'Saving...';
    try {
      const r = await fetch(gccApi.base + '/api/clients/me', {
        method:'PUT', credentials:'include',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)
      });
      msg.textContent = r.ok ? '✓ Saved' : '✗ Failed';
    } catch(err) { msg.textContent = 'Failed: ' + err.message; }
  });
}).catch(() => { /* redirected */ });
</script>
</body>
</html>
