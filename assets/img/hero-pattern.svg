<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" stroke="#1E4D2B" stroke-width="1.4" aria-hidden="true">
  <!-- Abstract structured-cabling pattern: patch-panel port grid, fiber traces,
       and IDF rack silhouette. Monochrome forest-green per brand voice rules.
       Used as a hero-right decoration; opacity controlled in CSS so the
       feature copy stays primary. -->
  <defs>
    <pattern id="dot-grid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.1" fill="#1E4D2B" opacity=".55"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E4D2B" stop-opacity="0"/>
      <stop offset="1" stop-color="#1E4D2B" stop-opacity=".4"/>
    </linearGradient>
  </defs>

  <!-- Background dot grid -->
  <rect x="0" y="0" width="600" height="600" fill="url(#dot-grid)" opacity=".5"/>

  <!-- Patch-panel band: top strip with ports -->
  <g opacity=".85">
    <rect x="60" y="120" width="480" height="36" rx="4" stroke-opacity=".7"/>
    <g fill="#1E4D2B" fill-opacity=".25">
      <!-- 24 ports in a row (8x3 in two strips actually -> just 24 along) -->
    </g>
    <!-- 24 little RJ45 ports -->
    <g fill="#1E4D2B" fill-opacity=".22">
      <rect x="72" y="130" width="14" height="16" rx="1.5"/>
      <rect x="92" y="130" width="14" height="16" rx="1.5"/>
      <rect x="112" y="130" width="14" height="16" rx="1.5"/>
      <rect x="132" y="130" width="14" height="16" rx="1.5"/>
      <rect x="152" y="130" width="14" height="16" rx="1.5"/>
      <rect x="172" y="130" width="14" height="16" rx="1.5"/>
      <rect x="192" y="130" width="14" height="16" rx="1.5"/>
      <rect x="212" y="130" width="14" height="16" rx="1.5"/>
      <rect x="232" y="130" width="14" height="16" rx="1.5"/>
      <rect x="252" y="130" width="14" height="16" rx="1.5"/>
      <rect x="272" y="130" width="14" height="16" rx="1.5"/>
      <rect x="292" y="130" width="14" height="16" rx="1.5"/>
      <rect x="312" y="130" width="14" height="16" rx="1.5"/>
      <rect x="332" y="130" width="14" height="16" rx="1.5"/>
      <rect x="352" y="130" width="14" height="16" rx="1.5"/>
      <rect x="372" y="130" width="14" height="16" rx="1.5"/>
      <rect x="392" y="130" width="14" height="16" rx="1.5"/>
      <rect x="412" y="130" width="14" height="16" rx="1.5"/>
      <rect x="432" y="130" width="14" height="16" rx="1.5"/>
      <rect x="452" y="130" width="14" height="16" rx="1.5"/>
      <rect x="472" y="130" width="14" height="16" rx="1.5"/>
      <rect x="492" y="130" width="14" height="16" rx="1.5"/>
      <rect x="512" y="130" width="14" height="16" rx="1.5"/>
    </g>
  </g>

  <!-- Cable runs: smooth curves that suggest cable management -->
  <g stroke-linecap="round" fill="none" opacity=".6">
    <path d="M60 220 C 200 240, 280 280, 540 200" stroke="#1E4D2B" stroke-width="2"/>
    <path d="M60 250 C 220 270, 320 310, 540 240" stroke="#1E4D2B" stroke-width="2" stroke-opacity=".6"/>
    <path d="M60 280 C 240 300, 360 340, 540 280" stroke="#1E4D2B" stroke-width="2" stroke-opacity=".4"/>
  </g>

  <!-- Switch / IDF block: bottom-right rack equipment silhouette -->
  <g opacity=".7">
    <rect x="240" y="380" width="300" height="40" rx="4"/>
    <rect x="240" y="430" width="300" height="40" rx="4" stroke-opacity=".7"/>
    <rect x="240" y="480" width="300" height="40" rx="4" stroke-opacity=".4"/>
    <!-- LED dots -->
    <g fill="#1E4D2B" fill-opacity=".7">
      <circle cx="260" cy="400" r="2"/>
      <circle cx="272" cy="400" r="2"/>
      <circle cx="284" cy="400" r="2"/>
      <circle cx="260" cy="450" r="2"/>
      <circle cx="272" cy="450" r="2"/>
    </g>
  </g>

  <!-- Subtle fade gradient overlay so left edge blends into hero copy -->
  <rect x="0" y="0" width="600" height="600" fill="url(#fade)"/>
</svg>
