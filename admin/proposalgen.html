<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
<title>Staff · Proposal Generator · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="/assets/favicon.ico" sizes="any" /><link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
<link rel="stylesheet" href="/assets/css/site.css?v=20260501-redesign" />
  <link rel="stylesheet" href="/assets/css/chrome.css?v=20260501-design-pass" />
<style>
  /* Make the bundler iframe fill what's left after the gcc-site header. */
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; }
  #gcc-header { flex: 0 0 auto; }
  .pg-shell { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; background: var(--paper); }
  .pg-bar {
    flex: 0 0 auto;
    padding: 10px 20px;
    background: white;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--slate);
  }
  .pg-bar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--forest);
    margin: 0;
    font-family: var(--font-display);
  }
  .pg-bar .spacer { flex: 1; }
  .pg-bar select {
    padding: 5px 10px;
    border: 1px solid var(--hairline-strong);
    border-radius: var(--r-sm);
    font-size: 13px;
    background: white;
    color: var(--ink);
    cursor: pointer;
  }
  .pg-bar a {
    padding: 5px 12px;
    border: 1px solid var(--hairline-strong);
    border-radius: var(--r-sm);
    font-size: 13px;
    color: var(--forest);
    text-decoration: none;
    font-weight: 600;
  }
  .pg-bar a:hover { background: var(--paper); border-color: var(--forest); }
  #pg-frame {
    flex: 1 1 auto;
    width: 100%;
    border: none;
    background: white;
    min-height: 0;
  }
  #page-loading { padding: 40px; text-align: center; color: var(--slate-light); }
</style>
</head>
<body>

<div id="gcc-header"></div>

<div id="page-loading">Loading...</div>

<div class="pg-shell" id="page-content" hidden>
  <div class="pg-bar">
    <h1>Proposal Generator</h1>
    <span style="color: var(--slate-light);">Embedded bundler — same content as proposal.greencommllc.com</span>
    <div class="spacer"></div>
    <label for="pg-version" style="font-weight:600;">Version:</label>
    <select id="pg-version" aria-label="Bundler version"></select>
    <a id="pg-popout" href="#" target="_blank" rel="noopener" title="Open this version in a new tab">Pop out ↗</a>
  </div>
  <iframe id="pg-frame" title="Proposal bundler" loading="lazy"></iframe>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
  <script src="/assets/js/footer.js"></script>
<script src="/assets/js/page.js"></script>
<script>
  // Bundler is hosted at proposal.greencommllc.com (IIS site `proposalgen`,
  // physical path C:\GCC_LLC\IIS\proposalgen\). We iframe it so the staff
  // header.js navigation wraps every visit, matching the "consistent nav
  // across pages" rule. Cross-origin iframe is fine — bundler doesn't need
  // postMessage to the parent for its core flow.
  var BUNDLER_BASE = 'https://proposal.greencommllc.com/';
  // List versions newest-first. Add new entries here as new Vxx files ship.
  var VERSIONS = [
    { value: 'Bundler V09.html',         label: 'V09 (latest)' },
    { value: 'Bundler V08.html',         label: 'V08' },
    { value: 'Bundler V07.html',         label: 'V07' },
    { value: 'Bundler V06.html',         label: 'V06' },
    { value: 'Bundler V05.html',         label: 'V05' },
    { value: 'bundle-builder.html',      label: 'Working copy (bundle-builder.html)' }
  ];

  gccPage.requireRole(['staff','admin']).then(function (me) {
    document.getElementById('page-loading').hidden = true;
    document.getElementById('page-content').hidden = false;

    var sel = document.getElementById('pg-version');
    var iframe = document.getElementById('pg-frame');
    var popout = document.getElementById('pg-popout');

    VERSIONS.forEach(function (v) {
      var opt = document.createElement('option');
      opt.value = v.value;
      opt.textContent = v.label;
      sel.appendChild(opt);
    });

    function load(version) {
      var url = BUNDLER_BASE + encodeURI(version);
      iframe.src = url;
      popout.href = url;
      try { localStorage.setItem('gcc.proposalgen.version', version); } catch (_) {}
    }

    var saved = null;
    try { saved = localStorage.getItem('gcc.proposalgen.version'); } catch (_) {}
    var initial = (saved && VERSIONS.some(function (v) { return v.value === saved; })) ? saved : VERSIONS[0].value;
    sel.value = initial;
    load(initial);

    sel.addEventListener('change', function () { load(sel.value); });

    // ── Compliance bridge ────────────────────────────────────────────
    // The bundler iframe runs at proposal.greencommllc.com — cross-origin,
    // so it can't reuse our staff session cookie. When the bundler is
    // about to ship a proposal (Send via Gmail / Print PDF) it posts a
    // {type:'compliance-check-request', ...} message; we forward to
    // /api/compliance/check with our admin session and post the report
    // back. This is the gate's only auth path — the bundler has no other
    // way to reach gcc-api.
    window.addEventListener('message', async function (ev) {
      var d = ev && ev.data;
      if (!d || d.type !== 'compliance-check-request') return;
      var reqId   = d.reqId || '';
      var bundler = ev.source;
      var origin  = ev.origin || '';
      // Only respond to the bundler we just loaded.
      try {
        var bundlerOrigin = new URL(BUNDLER_BASE).origin;
        if (origin !== bundlerOrigin) return;
      } catch (_) { return; }
      try {
        var resp = await fetch('/api/compliance/check', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content:         d.content || '',
            docType:         d.docType || 'proposal',
            job:             d.job || '',
            otherJobs:       d.otherJobs       || [],
            otherClients:    d.otherClients    || [],
            sourcesProvided: !!(d.sources && d.sources.length),
            sources:         d.sources         || [],
          }),
        });
        var report = null, err = null;
        if (resp.ok) report = await resp.json();
        else err = 'HTTP ' + resp.status + ': ' + (await resp.text()).slice(0, 300);
        bundler.postMessage({
          type:   'compliance-check-response',
          reqId:  reqId,
          report: report,
          error:  err,
        }, bundlerOrigin);
      } catch (e) {
        bundler.postMessage({
          type:   'compliance-check-response',
          reqId:  reqId,
          error:  'bridge fetch failed: ' + (e && e.message ? e.message : String(e)),
        }, origin);
      }
    });
  }).catch(function () { /* gccPage redirected to login */ });
</script>
  <div id="gcc-footer"></div>
</body>
</html>
