<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GCC Manager · Projects</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#1E4D2B" />
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
  <link rel="stylesheet" href="/assets/css/site.css?v=20260501-restructure" />
  <link rel="stylesheet" href="/assets/css/chrome.css?v=20260501-wizard" />
  <style>
    /* Iframe shell — fills the viewport below the GCC site nav so the
       embedded operator tool feels seamless. The actual tool lives at
       /admin/bc-leads-tool.html and gets ?secret= forwarded from the
       URL so the tray-launcher contract still works. */
    body { background: var(--paper, #F4F4EE); }
    body.dash main#main { padding: 0; }
    .tool-frame-shell {
      display: flex; flex-direction: column;
      height: calc(100vh - 64px);
      width: 100%;
    }
    .tool-frame-shell iframe {
      flex: 1; width: 100%; border: 0;
      background: white;
      display: block;
    }
    /* Hide the unified footer on tool pages — the iframe owns its own
       chrome + the page already feels framed by the site banner above. */
    body.dash #gcc-footer, body.dash .gcc-footer { display: none; }
  </style>
</head>
<body class="dash">
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="gcc-header"></div>
  <main id="main">
    <div class="tool-frame-shell">
      <iframe id="tool-frame"
              title="BC Projects · GCC Manager"
              loading="eager"
              allow="clipboard-read; clipboard-write"
              src="about:blank"></iframe>
    </div>
  </main>
  <div id="gcc-footer"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/header.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script>
    (function () {
      // Forward URL params (incl. ?secret= from tray launcher) to the
      // embedded tool so localStorage bootstrap still fires inside the
      // iframe.
      var params = location.search ? location.search.replace(/^\?/, '?') : '';
      var src = '/admin/bc-leads-tool.html' + params + location.hash;
      document.getElementById('tool-frame').src = src;
    })();
  </script>
</body>
</html>
