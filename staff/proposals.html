<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff · Proposals · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="/assets/favicon.ico" sizes="any" /><link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
<link rel="stylesheet" href="/assets/css/site.css" />
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
.kpi { background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 18px; box-shadow: var(--shadow-xs); }
.kpi .lbl { font-size: 11px; font-weight: 700; color: var(--slate-light); letter-spacing: 0.06em; text-transform: uppercase; }
.kpi .val { font-size: 28px; font-weight: 800; color: var(--forest); margin-top: 4px; line-height: 1; font-family: var(--font-display); letter-spacing: -0.01em; }
.kpi .delta { font-size: 12px; color: var(--slate); margin-top: 4px; }
.tbl { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); overflow: hidden; font-size: 14px; }
.tbl th { text-align: left; padding: 10px 12px; background: var(--paper); font-size: 11px; font-weight: 700; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--hairline); }
.tbl td { padding: 10px 12px; border-top: 1px solid var(--hairline); }
.tbl tr:hover td { background: rgba(30,77,43,0.03); }
.tbl .actions a, .tbl .actions button { font-size: 12px; padding: 4px 8px; margin-right: 4px; background: white; border: 1px solid var(--hairline-strong); border-radius: 5px; cursor: pointer; color: var(--forest); text-decoration: none; }
.tbl .actions a:hover, .tbl .actions button:hover { background: var(--paper); border-color: var(--forest); }
.empty-state { background: white; border: 1px dashed var(--hairline-strong); border-radius: var(--r-md); padding: 40px 20px; text-align: center; color: var(--slate); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.status-pill { display: inline-block; padding: 2px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.status-new { background: rgba(212,175,55,0.18); color: var(--gold-dark); }
.status-contacted { background: rgba(74,85,104,0.18); color: var(--slate); }
.status-quoted { background: rgba(56,178,172,0.18); color: #2C7A7B; }
.status-won { background: rgba(72,187,120,0.18); color: #276749; }
.status-lost { background: rgba(245,101,101,0.18); color: #C53030; }
.status-spam { background: rgba(160,174,192,0.18); color: var(--slate-light); }
.status-active { background: rgba(72,187,120,0.18); color: #276749; }
.status-locked { background: rgba(245,101,101,0.18); color: #C53030; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.filter-bar .filter-pill { padding: 6px 14px; border: 1px solid var(--hairline-strong); border-radius: var(--r-pill); font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: var(--slate); }
.filter-bar .filter-pill.active { background: var(--forest); color: white; border-color: var(--forest-dark); }
.filter-bar .filter-pill:hover:not(.active) { background: var(--paper); }
</style>
</head>
<body>

<div id="gcc-header"></div>

<section style="padding: 28px 0; background: var(--paper); border-bottom: 1px solid var(--hairline);">
  <div class="container">
    <h1 style="margin-bottom: 4px;">Proposals</h1>
    <p style="color: var(--slate); margin: 0;">Estimates submitted to clients, awaiting decision.</p>
  </div>
</section>

<section style="padding: 28px 0;">
  <div class="container">
    <div id="page-loading" style="text-align:center; padding: 40px; color: var(--slate-light);">Loading...</div>
    <div id="page-content" hidden>
<div id="proposals-table">Loading...</div>
    </div>
  </div>
</section>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
<script src="/assets/js/page.js"></script>
<script>
gccPage.requireRole(["staff","admin"]).then(async (me) => {
  document.getElementById('page-loading').hidden = true;
  document.getElementById('page-content').hidden = false;
  try {
    const ests = await fetch(gccApi.base + '/api/admin/estimates?take=200', {credentials:'include'}).then(r => r.json());
    const target = document.getElementById('proposals-table');
    if (!ests.length) {
      target.innerHTML = '<div class="empty-state"><div class="es-icon">📝</div><div>No proposals yet.</div></div>';
    } else {
      function escapeAttr(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
      const rows = ests.map((e, idx) => {
        const proj = e.projectName || e.source || '';
        const compCell = '<button class="comp-run" data-idx="' + idx + '" data-project="' + escapeAttr(proj) + '">Run Check</button><span class="comp-status" data-idx="' + idx + '"></span>';
        return '<tr>' +
          '<td>' + gccPage.datetime(e.createdAt) + '</td>' +
          '<td>' + (e.clientEmail || '--') + '</td>' +
          '<td>' + escapeAttr(proj) + '</td>' +
          '<td>' + e.clientType + '</td>' +
          '<td>' + gccPage.money(e.estimateMin) + ' -- ' + gccPage.money(e.estimateMax) + '</td>' +
          '<td>' + e.lineItemCount + '</td>' +
          '<td><span class="status-pill status-' + e.status + '">' + e.status + '</span></td>' +
          '<td class="comp-cell">' + compCell + '</td>' +
        '</tr>';
      }).join('');
      target.innerHTML =
        '<table class="tbl"><thead><tr>' +
        '<th>Date</th><th>Client</th><th>Project</th><th>Type</th><th>Range</th><th>Lines</th><th>Status</th><th>Compliance</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>' +
        '<style>' +
        '.comp-run { font-size: 12px; padding: 4px 10px; background: white; border: 1px solid var(--hairline-strong); border-radius: 5px; cursor: pointer; color: var(--forest); }' +
        '.comp-run:hover:not([disabled]) { background: var(--paper); border-color: var(--forest); }' +
        '.comp-run[disabled] { opacity: 0.55; cursor: progress; }' +
        '.comp-status { margin-left: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 8px; border-radius: var(--r-pill); }' +
        '.comp-status.info  { background: rgba(56,178,172,0.18); color: #2C7A7B; }' +
        '.comp-status.warn  { background: rgba(212,175,55,0.20); color: var(--gold-dark); }' +
        '.comp-status.block { background: rgba(245,101,101,0.22); color: #C53030; }' +
        '.comp-status .ct   { opacity: 0.85; font-weight: 600; }' +
        '</style>';

      // Wire up "Run Check" buttons.
      target.querySelectorAll('button.comp-run').forEach(btn => {
        btn.addEventListener('click', async () => {
          const project = btn.getAttribute('data-project');
          const idx     = btn.getAttribute('data-idx');
          const sp      = target.querySelector('.comp-status[data-idx="' + idx + '"]');
          if (!project) {
            sp.className = 'comp-status warn';
            sp.textContent = 'no project';
            return;
          }
          btn.disabled = true;
          btn.textContent = 'Running...';
          sp.textContent = '';
          sp.className = 'comp-status';
          try {
            const r = await fetch(gccApi.base + '/api/compliance/check-job', {
              method: 'POST',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json; charset=utf-8' },
              body: JSON.stringify({ projectName: project }),
            });
            if (!r.ok) {
              const t = await r.text();
              sp.className = 'comp-status warn';
              sp.textContent = 'err ' + r.status;
              sp.title = t.slice(0, 300);
              btn.textContent = 'Re-run';
              btn.disabled = false;
              return;
            }
            const rep = await r.json();
            const blocks = rep.counts.block, warns = rep.counts.warn;
            sp.className = 'comp-status ' + rep.status;
            sp.textContent = rep.status + (rep.status !== 'info' ? ' (' + blocks + 'b/' + warns + 'w)' : ' clean');
            sp.title = (rep.findings || []).slice(0, 6).map(f => f.severity.toUpperCase() + ': ' + f.message).join('\n');
            btn.textContent = 'Re-run';
            btn.disabled = false;
          } catch (e) {
            sp.className = 'comp-status warn';
            sp.textContent = 'error';
            sp.title = e.message;
            btn.textContent = 'Re-run';
            btn.disabled = false;
          }
        });
      });
    }
  } catch(e) { document.getElementById('proposals-table').innerHTML = '<div class="empty-state">Failed to load.</div>'; }
}).catch(() => { /* redirected */ });
</script>
</body>
</html>
