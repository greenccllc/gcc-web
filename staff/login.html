<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Staff sign-in · GCC Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
  <meta name="theme-color" content="#1E4D2B" />
  <link rel="stylesheet" href="/assets/css/site.css?v=20260501-staff-login" />
  <style>
    html, body { margin:0; padding:0; background:var(--cream, #FBFAF5);
                 font-family:'Source Sans 3', system-ui, -apple-system, sans-serif;
                 color:var(--ink, #15201A); }
    .login-shell {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:24px;
    }
    .login-card {
      width:100%; max-width:420px; background:white;
      border:1px solid var(--line, rgba(21,32,26,.09));
      border-radius:16px; padding:32px 28px;
      box-shadow:0 8px 28px rgba(15,26,18,.07);
    }
    .login-logo {
      display:flex; align-items:center; gap:10px; margin-bottom:18px;
    }
    .login-logo img { height:38px; }
    .login-logo strong { font-size:18px; color:var(--forest, #1E4D2B); }
    .login-card h1 { margin:0 0 6px; font-size:20px; font-weight:700; color:var(--ink, #15201A); }
    .login-card .sub { margin:0 0 22px; font-size:13px; color:var(--slate, #4F5B57); line-height:1.5; }
    .gsi-slot { min-height:44px; }
    .login-msg {
      margin-top:14px; padding:10px 12px; font-size:12px; line-height:1.5;
      border-radius:8px; display:none;
    }
    .login-msg.err { display:block; background:#FEE2E2; color:#7F1D1D; border:1px solid #FCA5A5; }
    .login-msg.note { display:block; background:#F4F4EE; color:var(--slate, #4F5B57); border:1px solid rgba(21,32,26,.08); }
    .login-foot {
      margin-top:18px; font-size:11px; color:var(--slate, #4F5B57); line-height:1.5;
    }
    .login-foot code { background:#F4F4EE; padding:1px 5px; border-radius:3px; font-size:10.5px; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <main class="login-shell">
    <div class="login-card">
      <div class="login-logo">
        <img src="/assets/img/gcc-logo-128.png" alt="GCC" />
        <strong>GCC Manager</strong>
      </div>
      <h1>Staff sign-in</h1>
      <p class="sub">This area is restricted to <strong>greencommllc.com</strong> accounts. Sign in with your Google Workspace email to continue.</p>

      <div id="gsi-slot" class="gsi-slot"></div>
      <div id="login-msg" class="login-msg" role="status" aria-live="polite"></div>

      <div class="login-foot">
        Need access? Email <code>nathan@greencommllc.com</code>. <br>
        Tray-launcher operators bypass this gate — your session inherits its <code>?secret=</code>.
      </div>
    </div>
  </main>

  <script>
    (function () {
      'use strict';
      // Pull `next` redirect target from URL; default to /staff/bc-leads.html
      var qs = new URLSearchParams(location.search);
      var next = qs.get('next') || '/staff/bc-leads.html';
      // Sanitize: only allow same-origin /staff/* paths to avoid open-redirect
      try {
        var u = new URL(next, location.origin);
        if (u.origin !== location.origin || !u.pathname.startsWith('/staff/')) {
          next = '/staff/bc-leads.html';
        } else {
          next = u.pathname + u.search + u.hash;
        }
      } catch (_) { next = '/staff/bc-leads.html'; }

      var msg = document.getElementById('login-msg');
      function showError(t) { msg.className = 'login-msg err'; msg.textContent = t; }
      function showNote(t)  { msg.className = 'login-msg note'; msg.textContent = t; }

      // Decode JWT payload (no signature verification — server-side checks
      // happen on every gcc-api call via X-Gcc-Admin-Secret; this client-side
      // gate is anti-crawler, not anti-tamper).
      function jwtPayload(t) {
        try {
          var parts = t.split('.');
          if (parts.length !== 3) return null;
          var pad = '='.repeat((4 - (parts[1].length % 4)) % 4);
          var b64 = (parts[1] + pad).replace(/-/g, '+').replace(/_/g, '/');
          return JSON.parse(decodeURIComponent(atob(b64).split('').map(function (c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join('')));
        } catch (_) { return null; }
      }

      function handleCredentialResponse(resp) {
        var p = resp && resp.credential ? jwtPayload(resp.credential) : null;
        if (!p) { showError('Could not read sign-in token.'); return; }
        if (p.hd !== 'greencommllc.com') {
          showError('Only @greencommllc.com accounts are allowed. Signed in as: ' + (p.email || '(unknown)'));
          return;
        }
        try {
          sessionStorage.setItem('gccStaffAuth', JSON.stringify({
            email: p.email,
            hd:    p.hd,
            exp:   Math.floor(Date.now() / 1000) + 12 * 3600,
          }));
        } catch (e) { showError('Session storage unavailable. ' + (e.message || '')); return; }
        location.replace(next);
      }

      // Read OAuth client id from a build-time config or window override.
      // The site publishes a config at /assets/js/config.js (created by
      // publish.ps1 from secrets) -- if missing, surface a clear error.
      var CLIENT_ID = (window.GCC_AUTH_CONFIG && window.GCC_AUTH_CONFIG.googleClientId) || '';

      function initGsi() {
        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
          setTimeout(initGsi, 80);
          return;
        }
        if (!CLIENT_ID) {
          showError('Sign-in not configured. Set window.GCC_AUTH_CONFIG.googleClientId in /assets/js/config.js (see docs/runbook-cloudflare-access.md).');
          return;
        }
        google.accounts.id.initialize({
          client_id: CLIENT_ID,
          hosted_domain: 'greencommllc.com',     // restricts the picker
          callback: handleCredentialResponse,
          auto_select: false,
          cancel_on_tap_outside: false,
        });
        google.accounts.id.renderButton(document.getElementById('gsi-slot'), {
          type: 'standard', theme: 'filled_black', size: 'large',
          text: 'signin_with', shape: 'rectangular', logo_alignment: 'left',
          width: 360,
        });
        // Show One Tap if previously seen
        google.accounts.id.prompt();
      }

      // Boot config from /assets/js/config.js (optional file populated by
      // publish.ps1). If absent the script tag will 404 silently — caught
      // by the CLIENT_ID guard above.
      var cfg = document.createElement('script');
      cfg.src = '/assets/js/config.js';
      cfg.onload = cfg.onerror = function () { initGsi(); };
      document.head.appendChild(cfg);
    })();
  </script>
</body>
</html>
