<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GCC Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
  <meta name="theme-color" content="#1E4D2B" />
  <style>
    :root {
      --forest:#1E4D2B; --gold:#C9A158; --ink:#1c2a23; --slate:#475a51;
      --cream:#FDFBF4; --green-tint:#F1F8F1; --line:#dde5df; --danger:#B71C1C;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; }
    body { font:13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Arial; color:var(--ink); background:var(--cream); }

    header { display:flex; align-items:center; justify-content:space-between;
             padding:10px 16px; background:var(--forest); color:white;
             position:sticky; top:0; z-index:6; }
    header h1 { margin:0; font-size:15px; font-weight:600; letter-spacing:.02em; display:flex; align-items:center; gap:8px; }
    header h1 img { height:22px; width:auto; }
    header .meta { font-size:12px; opacity:.85; }
    header button#rescan { background:var(--gold); color:var(--ink); border:0; padding:7px 14px;
                    font-size:12px; font-weight:600; border-radius:4px; cursor:pointer; letter-spacing:.02em; }
    header button#rescan:disabled { opacity:.5; cursor:wait; }
    header button#refresh { background:rgba(255,255,255,.15); color:white; border:0; padding:7px 12px;
                            font-size:12px; font-weight:600; border-radius:4px; cursor:pointer; letter-spacing:.02em; }
    header button#refresh:hover { background:rgba(255,255,255,.28); }
    header button#refresh:disabled { opacity:.5; cursor:wait; }

    .tabs { display:flex; gap:4px; }
    .tab { background:transparent; color:rgba(255,255,255,.75); border:0; padding:7px 14px;
           font-size:12px; font-weight:600; border-radius:4px; cursor:pointer; letter-spacing:.02em; }
    .tab.active, .tab:hover { background:rgba(255,255,255,.18); color:white; }

    .row-actions { display:flex; gap:4px; flex-wrap:wrap; }
    .row-actions button {
      background:white; color:var(--forest); border:1px solid var(--line);
      padding:3px 9px; font-size:11px; font-weight:600; border-radius:11px; cursor:pointer;
    }
    .row-actions button:hover { border-color:var(--forest); background:var(--green-tint); }
    .row-actions button.accepted { background:var(--green-tint); border-color:var(--forest); color:var(--forest); }
    .row-actions button:disabled { opacity:.5; cursor:wait; }

    /* Sticky stack under the header: summary chips at 46, status pills below it,
       table head pinned under both. Heights are explicit so the offsets stay in
       sync as the bands change. */
    .summary { display:flex; gap:10px; padding:10px 16px; background:white;
               border-bottom:1px solid var(--line); flex-wrap:wrap; position:sticky; top:46px; z-index:5;
               min-height:36px; align-items:center; }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px;
            background:var(--green-tint); border:1px solid var(--line); border-radius:14px; font-size:12px; }
    .chip strong { color:var(--forest); }

    table { border-collapse:collapse; width:100%; background:white; }
    thead th { position:sticky; top:138px; background:var(--cream); border-bottom:2px solid var(--forest);
               padding:8px 10px; font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
               color:var(--slate); text-align:left; z-index:4; cursor:pointer; user-select:none; white-space:nowrap; }
    thead th:hover { background:#f5f1e1; }
    thead th .sort-ind { display:inline-block; width:10px; opacity:.55; margin-left:3px; }
    tbody td { border-bottom:1px solid var(--line); padding:7px 10px; vertical-align:middle; }
    tbody tr.row { cursor:pointer; }
    tbody tr.row:hover { background:var(--green-tint); }
    tbody tr.row .toggle { display:inline-block; width:13px; color:var(--slate); transition:transform .15s; }
    tbody tr.row.open .toggle { transform:rotate(90deg); color:var(--forest); }

    /* Status group header */
    tr.group-hdr td { background:linear-gradient(180deg, var(--green-tint) 0%, white 100%);
                       padding:10px 14px; font-weight:600; color:var(--forest);
                       border-top:1px solid var(--line); border-bottom:1px solid var(--line);
                       letter-spacing:.04em; font-size:12px; text-transform:uppercase;
                       cursor:pointer; user-select:none; }
    tr.group-hdr td:hover { background:linear-gradient(180deg, #E5F1E5 0%, white 100%); }
    tr.group-hdr td .count { font-weight:400; color:var(--slate); margin-left:6px; }
    tr.group-hdr .gtoggle { display:inline-block; width:13px; color:var(--forest); transition:transform .15s; }
    tr.group-hdr.collapsed .gtoggle { transform:rotate(-90deg); }
    /* Scope (trade icons + names) chips next to actions on Undecided rows */
    .scope-chips { display:inline-flex; gap:4px; flex-wrap:wrap; }
    .scope-chip  { display:inline-flex; align-items:center; gap:4px;
                   padding:2px 8px; border:1px solid var(--line); border-radius:11px;
                   background:white; color:var(--slate); font-size:11px; font-weight:500; }
    .scope-chip .ico { font-size:13px; line-height:1; }
    .scope-chip.unknown { color:#999; font-style:italic; }
    /* Submitted "Scan Addenda" red flag when an addendum is detected. */
    .row-actions button.danger {
      background:#FFEBEE; color:var(--danger); border-color:#F4CCCC;
      font-weight:700; animation:pulseRed 1.4s ease-in-out infinite;
    }
    .row-actions button.danger:hover { background:#FFCDD2; }
    @keyframes pulseRed { 0%,100% { box-shadow:0 0 0 0 rgba(183,28,28,.0); }
                          50%     { box-shadow:0 0 0 4px rgba(183,28,28,.18); } }
    .row-actions button.paused {
      background:#FFF8E1; color:#7A5A00; border-color:#F0DEA0;
    }
    /* Project Details modal */
    .modal-bg { position:fixed; inset:0; background:rgba(28,42,35,.55); z-index:50;
                display:flex; align-items:center; justify-content:center; }
    .modal    { background:white; max-width:720px; width:92%; max-height:80vh; overflow:auto;
                border-radius:8px; box-shadow:0 10px 40px rgba(0,0,0,.3); padding:22px 26px; }
    .modal h2 { margin:0 0 4px; color:var(--forest); font-size:18px; }
    .modal .sub { color:var(--slate); font-size:12px; margin-bottom:14px; }
    .modal .body { white-space:pre-wrap; font-size:13px; color:var(--ink); line-height:1.55; }
    .modal .body em { color:var(--slate); font-style:italic; }
    .modal .close { float:right; background:transparent; border:0; font-size:18px; color:var(--slate); cursor:pointer; padding:0 4px; }
    .modal .meta-row { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 6px; }

    .status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; white-space:nowrap; }
    .status-Undecided { background:#FFF4D8; color:#7A5A00; }
    .status-Accepted  { background:#D9EAD3; color:var(--forest); }
    .status-Submitted { background:#CFE2F3; color:#1A5490; }
    .status-Won       { background:var(--gold); color:var(--ink); }
    .status-Archived  { background:#EEE; color:#666; }
    .status-Lost      { background:#F4CCCC; color:var(--danger); }
    .ok  { color:var(--forest); font-weight:600; }
    .pad { color:#aaa; font-style:italic; }
    .small { font-size:11px; color:var(--slate); }
    a { color:var(--forest); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .folder-link { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border:1px solid var(--line); border-radius:12px; font-size:11px; background:white; }
    .folder-link:hover { background:var(--green-tint); border-color:var(--forest); }
    .files-cell { display:inline-flex; align-items:center; gap:8px; }
    .files-cell .files-stats { color:var(--slate); }
    .loc-link { color:var(--slate); text-decoration:none; cursor:pointer; border-bottom:1px dotted var(--line); }
    .loc-link:hover { color:var(--forest); border-bottom-color:var(--forest); text-decoration:none; }

    /* Drop counts sub-row (default hidden — toggled) */
    tr.counts { display:none; }
    tr.counts.open { display:table-row; }
    tr.counts td { background:var(--cream); padding:8px 14px 14px; border-bottom:2px solid var(--line); }
    .counts-grid { display:grid; grid-template-columns:repeat(10, 1fr); gap:6px; }
    .count-pill { display:flex; align-items:center; justify-content:space-between; gap:6px;
                  padding:5px 10px; border:1px solid var(--line); border-radius:14px;
                  background:white; font-size:11px; color:var(--slate); }
    .count-pill .lbl { font-weight:600; letter-spacing:.04em; text-transform:uppercase; font-size:10px; }
    .count-pill .val { font-weight:700; color:var(--ink); min-width:18px; text-align:right; }
    .count-pill.empty { opacity:.45; }
    .count-pill.has   { border-color:var(--forest); background:var(--green-tint); }
    /* Italic value = the agent estimated this count from drawing symbols /
       riser diagrams instead of finding an explicit "N" in the text.
       Driven by row's extraction_confidence < 0.7. */
    .count-pill.estimated .val { font-style:italic; font-weight:600; }
    .count-pill.estimated .val::after { content:' ?'; opacity:.55; font-size:9px; vertical-align:super; }
    /* By default only the "has" pills are shown; the "Show all" toggle reveals
       the rest in case manual edits are needed for non-scope-related categories. */
    .counts-grid:not(.show-empty) .count-pill.empty { display:none; }
    .counts-toolbar { display:flex; justify-content:space-between; align-items:center;
                      margin-bottom:6px; gap:8px; }
    .counts-toolbar .show-all { background:transparent; border:0; color:var(--slate);
                                font-size:11px; cursor:pointer; padding:2px 6px;
                                border-radius:8px; }
    .counts-toolbar .show-all:hover { background:var(--green-tint); color:var(--forest); }
    .counts-toolbar .show-all.active { background:var(--forest); color:white; }
    .due-overdue { color:var(--danger); font-weight:600; }
    /* Per-row action buttons live in the expanded sub-row, above the
       drop-counts grid -- clicking the chevron in the Project column
       reveals them. Keeps the main table dense; surfaces actions in
       context with the per-RFP detail. */
    .row-actions-bar { display:flex; gap:8px; align-items:center; padding:0 0 8px;
                       border-bottom:1px dashed var(--line); margin-bottom:8px; }
    .row-actions-bar .row-actions { gap:6px; }

    .progress-bar { display:inline-block; width:70px; height:6px; background:var(--line);
                    border-radius:3px; overflow:hidden; vertical-align:middle; margin-right:5px; }
    .progress-bar > span { display:block; height:100%; background:var(--forest); }

    @media (max-width:1100px) { .counts-grid { grid-template-columns:repeat(5, 1fr); } }
    #status-bar { position:fixed; right:14px; bottom:10px; background:var(--ink); color:white;
                  padding:6px 12px; border-radius:14px; font-size:11px; opacity:0;
                  transition:opacity .15s; pointer-events:none; }
    #status-bar.show { opacity:.92; }
    #empty { padding:60px 20px; text-align:center; color:var(--slate); }

    /* Status filter pills sit BELOW the summary band and ABOVE the table head. */
    .status-pills { display:flex; gap:6px; padding:6px 16px 8px; background:white;
                    border-bottom:1px solid var(--line); position:sticky; top:92px; z-index:5; flex-wrap:wrap;
                    min-height:38px; align-items:center; }
    .status-pill { background:white; border:1px solid var(--line); border-radius:14px;
                   padding:4px 12px; font-size:12px; font-weight:600; cursor:pointer; color:var(--slate); }
    .status-pill:hover { border-color:var(--forest); color:var(--forest); }
    .status-pill.active { background:var(--forest); color:white; border-color:var(--forest); }
    .status-pill .count { margin-left:5px; font-weight:400; opacity:.75; font-size:11px; }

    /* Project-name hover tooltip with confidence + next-best-step. */
    .proj-link { position:relative; cursor:pointer; }
    .proj-tip { position:absolute; left:0; top:130%; min-width:280px; max-width:380px;
                background:var(--ink); color:white; padding:10px 12px; border-radius:6px;
                box-shadow:0 6px 20px rgba(0,0,0,.35); z-index:30; font-size:12px;
                display:none; line-height:1.45; white-space:normal; }
    .proj-link:hover .proj-tip { display:block; }
    .proj-tip .tip-conf { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; margin-bottom:4px; }
    .proj-tip .tip-conf .bar { width:80px; height:6px; background:rgba(255,255,255,.18); border-radius:3px; overflow:hidden; }
    .proj-tip .tip-conf .bar > span { display:block; height:100%; background:var(--gold); }
    .proj-tip .tip-reason { color:#cbd6cf; font-style:italic; margin:6px 0 8px; }
    .proj-tip .tip-step-btn { background:var(--gold); color:var(--ink); border:0; padding:5px 10px;
                              border-radius:4px; font-size:11px; font-weight:600; cursor:pointer; }
    .proj-tip .tip-step-btn:hover { background:#dab164; }

    /* Action dropdown (kebab) in the expanded sub-row. */
    .action-menu { position:relative; display:inline-block; }
    .action-menu > button.menu-trigger {
      background:var(--forest); color:white; border:0; padding:5px 12px; border-radius:4px;
      font-size:11px; font-weight:600; cursor:pointer; letter-spacing:.04em;
    }
    .action-menu > button.menu-trigger:hover { background:#0d3d11; }
    .action-menu > button.menu-trigger::after { content:' ▾'; font-size:9px; }
    .action-menu .menu-list {
      position:absolute; left:0; top:110%; min-width:230px; background:white;
      border:1px solid var(--line); border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,.18);
      z-index:25; padding:4px; display:none;
    }
    .action-menu.open .menu-list { display:block; }
    .action-menu .menu-list button {
      width:100%; text-align:left; background:transparent; border:0; padding:7px 12px;
      cursor:pointer; font-size:12px; color:var(--ink); border-radius:4px; display:flex;
      align-items:center; gap:8px;
    }
    .action-menu .menu-list button:hover { background:var(--green-tint); color:var(--forest); }
    .action-menu .menu-list button.danger { color:var(--danger); }
    .action-menu .menu-list button.danger:hover { background:#FFEBEE; }
    .action-menu .menu-list .submenu-label { padding:4px 12px 2px; color:var(--slate);
                                              font-size:10px; text-transform:uppercase; letter-spacing:.04em; }
    .action-menu .menu-list .divider { height:1px; background:var(--line); margin:4px 0; }
    .action-menu .menu-list select { width:100%; margin:2px 0; padding:5px; font-size:12px;
                                      border:1px solid var(--line); border-radius:4px; }

    /* Folder icon prefix on Project name. */
    .proj-folder-icon { color:var(--slate); margin-right:6px; font-size:13px; vertical-align:-1px; cursor:pointer; }
    .proj-folder-icon:hover { color:var(--forest); }
    .proj-folder-icon.missing { opacity:.4; cursor:not-allowed; }
    /* Scope chips inline next to the project name. */
    .proj-scope { display:inline-flex; gap:4px; margin-left:8px; flex-wrap:wrap; vertical-align:middle; }

    /* Resizable column headers -- a 4px right edge handle on every <th>. */
    thead th .col-resizer {
      position:absolute; right:0; top:0; width:4px; height:100%; cursor:col-resize;
      background:transparent; user-select:none;
    }
    thead th .col-resizer:hover, thead th .col-resizer.dragging { background:var(--gold); }
    thead th { padding-right:14px; position:relative; }

    /* Expanded sub-panel: GC card, counts grid, Date Added footer. */
    .row-meta-card { display:flex; gap:18px; flex-wrap:wrap; padding:6px 0 10px;
                     border-bottom:1px dashed var(--line); margin-bottom:8px; font-size:12px; }
    .row-meta-card .field { display:flex; flex-direction:column; gap:1px; }
    .row-meta-card .field .lbl { color:var(--slate); font-size:10px; text-transform:uppercase; letter-spacing:.04em; }
    .row-meta-card .field .val { color:var(--ink); font-weight:500; }
    .row-footer { color:var(--slate); font-size:10.5px; text-align:right; padding-top:6px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1><img src="/assets/img/gcc-logo-128.png" alt="GCC" />GCC Manager</h1>
      <div class="meta" id="meta">loading...</div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="leads">BC Leads</button>
      <button class="tab" data-tab="processes">Processes</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="small" id="auto" style="color:rgba(255,255,255,.7)"></span>
      <button id="refresh" title="Refetch the leads-summary feed (no BC scrape)">↻ Refresh</button>
      <button id="rescan" title="Force-fire BC scrape tasks now">Rescan now</button>
    </div>
  </header>

  <!-- =================== Leads tab =================== -->
  <section id="tab-leads">
    <div class="summary" id="summary"></div>
    <div class="status-pills" id="status-pills"></div>
    <table id="t">
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" hidden>No RFPs scraped yet. Click "Rescan now" to trigger a fresh pull.</div>
  </section>

  <!-- =================== Processes tab =================== -->
  <section id="tab-processes" hidden>
    <div class="summary"><span class="chip"><strong id="proc-count">0</strong> automated processes</span><span class="chip" id="proc-running-chip" style="display:none">⚙️ <strong id="proc-running">0</strong> running now</span></div>
    <table id="proc-table">
      <thead>
        <tr>
          <th style="cursor:default">Task</th>
          <th style="cursor:default">State</th>
          <th style="cursor:default">Last run</th>
          <th style="cursor:default">Next run</th>
          <th style="cursor:default">Last result</th>
          <th style="cursor:default">Actions</th>
        </tr>
      </thead>
      <tbody id="proc-rows"></tbody>
    </table>
  </section>

  <div id="status-bar"></div>

  <!-- Project Details modal: surfaced by the Undecided row "Project Details" button. -->
  <div id="modal" hidden></div>

<script>
'use strict';

// Map of BC trade-name fragments -> emoji icon. Drives the scope chips on
// Undecided rows. Order matters; the first match wins.
const TRADE_ICONS = [
  [/data|voice|low.?volt|telecom|communic/i,           '📡'],
  [/fiber/i,                                            '🧵'],
  [/security|access\s*control|intrusion/i,              '🔐'],
  [/camera|surveill|cctv|video/i,                       '📹'],
  [/audio|av\b|a\/v/i,                                  '🎚️'],
  [/fire|alarm|life.?safety/i,                          '🚨'],
  [/intercom/i,                                         '📞'],
  [/tv\b|display|signage/i,                             '📺'],
  [/electric/i,                                         '⚡'],
  [/network|wifi|wi-?fi|wlan|wireless/i,                '📶'],
  [/cabling|wiring|raceway|conduit/i,                   '🔌'],
  [/door|opening|hardware/i,                            '🚪'],
  [/general|gc\b|construction|civil/i,                  '🏗️'],
  [/demolition|demo\b/i,                                '🔨'],
];
function tradeIcon(label) {
  for (const [re, ico] of TRADE_ICONS) if (re.test(label || '')) return ico;
  return '🔧';
}

// Reduce a free-form address to "City, ST" for the Location column. The full
// string still lives on the link's title attribute for hover, and is what
// gets sent to Google Maps. BC sometimes hands us the bare "City, ST", and
// sometimes a full street address with ZIP and country tacked on.
function compactLocation(loc) {
  if (!loc) return '';
  const s = loc.trim().replace(/,\s*United States.*$/i, '').replace(/\s+/g, ' ');
  // Already compact -- "City, ST" or "City, State"
  if (/^[^,]+,\s*([A-Z]{2}|[A-Za-z]{3,})\s*$/.test(s)) return s;
  // Pattern: "...something..., City, ST 12345" -- pull the last "City, ST"
  const m = s.match(/,\s*([^,]+?),\s*([A-Z]{2})(?:\s+\d{4,5}(?:-\d{4})?)?\s*$/);
  if (m) return `${m[1].trim()}, ${m[2]}`;
  // Pattern: "City, ST 12345" with no street prefix
  const m2 = s.match(/^([^,]+?),\s*([A-Z]{2})(?:\s+\d{4,5})?\s*$/);
  if (m2) return `${m2[1].trim()}, ${m2[2]}`;
  return s;
}

// Auth: ?secret= on the URL (set by the tray launcher) OR localStorage fallback.
const URL_PARAMS = new URLSearchParams(location.search);
const SECRET = URL_PARAMS.get('secret') || localStorage.getItem('gccAdminSecret') || '';
if (URL_PARAMS.get('secret')) localStorage.setItem('gccAdminSecret', URL_PARAMS.get('secret'));

// API base: same origin by default; override with ?api=... for local-host probes.
const API_BASE = URL_PARAMS.get('api') || ('https://api.' + location.hostname.replace(/^www\./, '').replace(/^staff\./, ''));

const $  = (id) => document.getElementById(id);
const fmt = (d) => d ? new Date(d).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
const fmtDate = (d) => d ? new Date(d).toLocaleDateString([], { month:'short', day:'numeric', year:'2-digit' }) : null;
const toast = (msg, ms = 2200) => { const b = $('status-bar'); b.textContent = msg; b.classList.add('show'); setTimeout(() => b.classList.remove('show'), ms); };

async function api(method, path, body = null) {
  if (!SECRET) throw new Error('No admin secret. Re-launch from the tray icon, or paste your secret into localStorage.gccAdminSecret.');
  const opts = { method, headers: { 'X-Gcc-Admin-Secret': SECRET, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  const text = await res.text();
  if (!res.ok) throw new Error(`${method} ${path} -> ${res.status}: ${text.slice(0, 300)}`);
  return text ? JSON.parse(text) : {};
}

function statusBadge(s) {
  const safe = (s || '').replace(/[^A-Za-z]/g, '') || 'Unknown';
  return `<span class="status status-${safe}">${s || '—'}</span>`;
}

// ===== columns =====
// `key` = sort key on the row object;  `accessor(r)` returns the rendered HTML.
// projectLabel = the bare site name from BC (no date prefix, no city suffix,
// no trade-scope suffix). BC project names habitually pile multiple "fluff"
// trailers onto the actual site name:
//
//   "Taste Buds Kitchen - Parkville, MO Signage"
//   "Five Four Restaurant & Drafthouse - Liberty Interior Signage"
//   "Barnes & Noble // Creve Coeur, MO Data & Telecommunications"
//
// Strip them iteratively (date leader, then scope, then city+state, then
// bare-city, then any leftover punctuation). The loop keeps going until the
// string stabilizes so multi-suffix tails like "- Liberty Interior Signage"
// fully unwind.
const SCOPE_TRAILER = /\s+(?:Data\s*(?:&|and)\s*Telecommunications|Voice\s*&\s*Data|Building\s*Signage|Interior\s*Signage|Exterior\s*Signage|Visual\s*Display\s*Boards?|Visual\s*Displays?|Low[\s-]?Voltage|Audio[\s\/-]?Visual|Telecommunications?|Communications?|Structured\s*Cabling|Cabling|Networking|Network|Electrical|Security|Fire\s*Alarm|Access\s*Control|Intercom|Paging|Sound\s*System|Datacom|Data|Telecom|Signage|AV)\s*$/i;
const DATE_LEADER    = /^\d{4}-\d{2}-\d{2}\s*[-–—]\s*/;
// "- City, ST" or "// City, ST" or ", City, ST" -- any of those at the tail.
const CITY_STATE_TAIL = /\s*(?:[-–—\/]+|,)\s*[^-,\/]{2,}?,\s*[A-Z]{2}\.?\s*$/;
// "- Word" or "// Word" or "- Multi Word" at the tail. Conservative: only
// strips when the remaining base is at least 2 words long, so "KC Lounge Bar"
// doesn't become "KC".
function tryStripBareCity(s) {
  const m = s.match(/^(.*?)\s+(?:[-–—\/]+)\s+([A-Z][^-\/]{1,40}?)\s*$/);
  if (!m) return s;
  const base = m[1].trim();
  if (base.split(/\s+/).length < 2) return s;     // don't dissolve short bases
  return base;
}
function trimScope(name) {
  if (!name) return '';
  let s = name.trim();
  let prev = null;
  while (s !== prev) {
    prev = s;
    s = s.replace(DATE_LEADER, '');
    s = s.replace(SCOPE_TRAILER, '').trim();
    s = s.replace(CITY_STATE_TAIL, '').trim();
    s = tryStripBareCity(s);
    s = s.replace(/[\s\-–—,\/\\]+$/, '').trim();
  }
  return s || name;                                // never collapse to empty
}
function projectLabel(r) { return trimScope(r.projectName) || r.driveJobFolderName || '(no name)'; }

// safeHtml: escape user-controlled strings before injecting into innerHTML.
function safeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

const COLS = [
  // Project: folder icon → project name → scope chips (icon + trade)
  // → confidence-tooltip on hover. Scope chips are now right next to the
  // name so the operator sees the trades without expanding the row.
  { id:'project', label:'Project',
    sort:(a,b) => projectLabel(a).localeCompare(projectLabel(b)),
    cell:(r) => {
      const fIcon = r.driveJobFolderId
        ? `<span class="proj-folder-icon" data-act="open-folder" data-folder-id="${r.driveJobFolderId}" title="${safeHtml(r.driveJobFolderName || '')}">📂</span>`
        : '<span class="proj-folder-icon missing" title="No Drive folder linked">📂</span>';
      const tip = projTip(r);
      const scopeChips = Array.isArray(r.trades) && r.trades.length
        ? `<span class="proj-scope">${r.trades.map(t => `<span class="scope-chip"><span class="ico">${tradeIcon(t)}</span>${safeHtml(t)}</span>`).join('')}</span>`
        : '';
      return `<span class="toggle">▶</span> ${fIcon}<span class="proj-link"><a href="${r.href || '#'}" data-act="open-bc" data-href="${r.href || ''}">${safeHtml(projectLabel(r))}</a>${tip}</span>${scopeChips}`;
    } },

  { id:'location', label:'Location',
    sort:(a,b) => (a.location || '').localeCompare(b.location || ''),
    cell:(r) => {
      if (!r.location) return '<span class="pad">—</span>';
      const compact = compactLocation(r.location);
      const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.location)}`;
      return `<a class="loc-link small" data-act="open-maps" data-href="${url}" title="${safeHtml(r.location)}">${safeHtml(compact)}</a>`;
    } },

  { id:'due', label:'Due',
    sort:(a,b) => (parseDue(a.dueAt) || 0) - (parseDue(b.dueAt) || 0),
    cell:(r) => renderDue(r.dueAt) },

  // Extraction: "73% (X of Y pages)" -- pages aggregate across all uploaded
  // files for this bid (sheets / images / PDF pages all count as "pages" --
  // it's the unit of agent work). Falls back to "(X of Y files)" only when
  // page counts haven't been tracked yet (legacy rows pre-pages_processed).
  { id:'extraction', label:'Extraction',
    sort:(a,b) => (a.extraction?.confidencePct || 0) - (b.extraction?.confidencePct || 0),
    cell:(r) => {
      const c     = r.extraction?.confidencePct;
      const pp    = r.extraction?.pagesProcessed || 0;
      const pt    = r.extraction?.pagesTotal     || 0;
      const proc  = r.extraction?.filesProcessed || 0;
      const total = r.filesTotal                 || proc;
      if (c == null && proc === 0 && pt === 0) return '<span class="pad">—</span>';
      const pct   = c == null ? '—' : `${Math.round(c)}%`;
      const detail = pt > 0
        ? `${pp} of ${pt} pages`
        : `${proc} of ${total} files`;
      return `<strong>${pct}</strong> <span class="small">(${detail})</span>`;
    } },

  { id:'cost', label:'AI cost',
    sort:(a,b) => (a.ai?.costUsd || 0) - (b.ai?.costUsd || 0),
    cell:(r) => {
      const c = r.ai?.costUsd;
      return c == null ? '<span class="pad">—</span>' :
        `$${Number(c).toFixed(4)}${r.ai?.tokensUsed ? ` <span class="small">(${(r.ai.tokensUsed/1000).toFixed(1)}k tok)</span>` : ''}`;
    } },

  { id:'uploads', label:'Files',
    sort:(a,b) => (a.scrape?.attachmentsCount || 0) - (b.scrape?.attachmentsCount || 0),
    cell:(r) => uploadsCell(r.scrape) },

  // Last file access -- newest BcRfpAttachments.UploadedAt, with BcRfps.LastSeenAt
  // as fallback for rows that haven't had any files uploaded yet.
  { id:'lastfile', label:'Last file access',
    sort:(a,b) => new Date(a.lastFileAt || a.lastSeenAt || 0) - new Date(b.lastFileAt || b.lastSeenAt || 0),
    cell:(r) => `<span class="small">${fmt(r.lastFileAt || r.lastSeenAt)}</span>` },
];

// Confidence tooltip on the project name. Shows the confidence bar + the
// "next best step" suggestion the backend computed for this row, with a
// button that POSTs the appropriate endpoint.
function projTip(r) {
  const c    = r.extraction?.confidencePct;
  const step = r.nextBestStep;
  const bar  = c == null ? '' : `<div class="bar"><span style="width:${Math.min(100, Math.max(0, Math.round(c)))}%"></span></div>`;
  const conf = c == null ? 'No extraction yet' : `${Math.round(c)}% confidence`;
  const stepBlock = step
    ? `<div class="tip-reason">${safeHtml(step.reason || '')}</div>
       <button class="tip-step-btn" data-act="next-step" data-id="${r.bcBidId}" data-step-act="${safeHtml(step.action)}">${safeHtml(step.label)}</button>`
    : `<div class="tip-reason">No specific recommendation -- this row looks good.</div>`;
  return `<span class="proj-tip" data-stop>
    <div class="tip-conf">${bar}<span>${conf}</span></div>
    ${stepBlock}
  </span>`;
}

// ===== Action dropdown menu =====
// Single "Actions ▾" button on every row; clicking expands a list of every
// action that's relevant to that row's current state. Includes Move-to-status
// (selectable), Rescan-details, and Delete in addition to the per-status
// actions (Extract more / Accept / Pause / View Prop / Scan Addenda /
// Project Details).
const STATUS_OPTIONS = ['Undecided', 'Accepted', 'Submitted', 'Won', 'Archived', 'Lost'];

function actionsCell(r) {
  const id       = r.bcBidId;
  const accepted = r.extraction?.accepted;
  const paused   = r.extractionPaused;
  const status   = r.status || 'Unknown';
  const flagged  = !!r.addendaSeen;

  const items = [];
  // Per-status primary actions
  if (status === 'Undecided') {
    items.push(`<button data-act="project-details" data-id="${id}">📋 Project Details</button>`);
  }
  if (status === 'Accepted') {
    items.push(`<button data-act="extract-more" data-id="${id}">🔬 Extract more (deeper pass)</button>`);
    items.push(`<button data-act="accept" data-id="${id}" class="${accepted ? 'accepted' : ''}">${accepted ? '✓ Accepted' : '✓ Accept extraction'}</button>`);
    items.push(`<button data-act="pause-toggle" data-id="${id}" data-paused="${paused ? '1' : '0'}">${paused ? '▶ Resume extraction' : '⏸ Pause extraction'}</button>`);
  }
  if (status === 'Submitted') {
    items.push(`<button data-act="view-prop" data-id="${id}">📤 View latest proposal</button>`);
    items.push(`<button data-act="scan-addenda" data-id="${id}" class="${flagged ? 'danger' : ''}">${flagged ? '⚠ Scan addenda (new addendum detected)' : '🔍 Scan addenda'}</button>`);
  }
  if (status !== 'Undecided' && status !== 'Accepted' && status !== 'Submitted') {
    items.push(`<button data-act="view-prop" data-id="${id}">📤 View latest proposal</button>`);
  }

  // Workflow + maintenance (always available)
  items.push(`<div class="divider"></div>`);
  items.push(`<div class="submenu-label">Move to status</div>`);
  items.push(`<select data-act="move-status" data-id="${id}">
    <option value="">— pick a status —</option>
    ${STATUS_OPTIONS.map(s => `<option value="${s}" ${s === status ? 'disabled' : ''}>${s}${s === status ? ' (current)' : ''}</option>`).join('')}
  </select>`);
  items.push(`<div class="divider"></div>`);
  items.push(`<button data-act="rescan-details" data-id="${id}">🔄 Rescan project details</button>`);
  items.push(`<button data-act="delete" data-id="${id}" class="danger">🗑 Delete RFP from GCC Manager</button>`);

  return `<div class="action-menu" data-stop>
    <button class="menu-trigger" data-act="toggle-menu">Actions</button>
    <div class="menu-list">${items.join('')}</div>
  </div>`;
}

const COUNT_KEYS = [
  ['data','DATA'],     ['fiber','FIBER'],   ['fiberEnc','FIBER ENC'], ['fiberPp','FIBER PP'], ['coax','COAX'],
  ['hdmi','HDMI'],     ['tv','TV'],         ['iot','IOT'],            ['aps','APS'],          ['intercom','INTERCOM'],
  ['camInt','CAM INT'],['camExt','CAM EXT'],['doors','DOORS'],        ['elevator','ELEVATOR'],['ups','UPS'],
  ['mdf','MDF'],       ['idf','IDF'],       ['switch','SWITCH'],      ['patch','PATCH'],      ['ladder','LADDER'],
];

// confidencePct < 70 (or null) means the agent had to estimate the counts
// from drawing symbols / riser diagrams instead of reading explicit numbers
// in the spec. Render those values in italics with a faint "?" superscript
// so the operator knows to spot-check before bidding.
function countsGrid(counts, confidencePct) {
  if (!counts) counts = {};
  const estimated = confidencePct == null || confidencePct < 70;
  let hasN = 0, emptyN = 0;
  const pills = COUNT_KEYS.map(([k, label]) => {
    const v = counts[k];
    const has = v != null && v !== 0;
    if (has) hasN++; else emptyN++;
    const cls = (has ? 'has' : 'empty') + (has && estimated ? ' estimated' : '');
    return `<div class="count-pill ${cls}"><span class="lbl">${label}</span><span class="val">${v == null ? '—' : v}</span></div>`;
  }).join('');
  // Always default to hiding non-scope pills. A fresh / unextracted row simply
  // shows "0 in scope · N hidden" with the toggle next to it -- the operator
  // can click "Show all" if they need to manually edit a count.
  const toolbar = `<div class="counts-toolbar">
    <span class="small">${hasN} in scope${emptyN ? ` · ${emptyN} hidden` : ''}</span>
    ${emptyN ? `<button type="button" class="show-all" data-act="toggle-show-empty">Show all (${emptyN})</button>` : ''}
  </div>`;
  return `${toolbar}<div class="counts-grid">${pills}</div>`;
}

function uploadsCell(scrape) {
  if (!scrape) return '<span class="pad">—</span>';
  const att = scrape.attachmentsCount || 0;
  const msg = scrape.messagesCount || 0;
  // Backend computes AVG(filled / applicable) across files. The agent is sometimes
  // optimistic and ends up filling more fields than it deemed "applicable" --
  // the raw percent exceeds 100. Cap the displayed value so we don't show "180%".
  const raw = scrape.progressPct == null ? null : Math.round(scrape.progressPct);
  const pct = raw == null ? null : Math.min(100, Math.max(0, raw));
  let parts = [];
  if (pct != null) parts.push(`<span class="progress-bar"><span style="width:${pct}%"></span></span><strong>${pct}%</strong>`);
  if (att) parts.push(`<span class="small">${att} att</span>`);
  if (msg) parts.push(`<span class="small">${msg} msg</span>`);
  if (parts.length === 0) parts.push('<span class="pad">none</span>');
  return parts.join(' · ');
}

// Parse the BC dueAt string ("Fri, Jul 19 2025 · 5:00 PM CDT" etc.) to ms.
function parseDue(s) {
  if (!s) return null;
  const t = Date.parse(s.replace(/[·•]/g, ' '));
  return isNaN(t) ? null : t;
}
const DUE_FMT = new Intl.DateTimeFormat([], { month:'short', day:'numeric', year:'numeric' });
function renderDue(s) {
  const t = parseDue(s);
  if (t == null) return s ? `<span class="small">${safeHtml(s)}</span>` : '<span class="pad">—</span>';
  const d = new Date(t);
  const overdue = t < Date.now();
  const cls = overdue ? 'due-overdue' : 'small';
  return `<span class="${cls}">${DUE_FMT.format(d)}</span>`;
}

// ===== state =====
// Status tabs replace the old in-table group headers; the active tab is
// persisted across reloads. Column widths are persisted too so the user's
// drag-resizes survive a refresh.
const STATUS_TAB_KEY = 'gccLeadsActiveStatusTab';
const COL_WIDTHS_KEY = 'gccLeadsColWidths';
const STATE = {
  data : null,
  sort : { col: 'lastfile', dir: 'desc' },
  open : new Set(),                                                 // bcBidIds with expanded count rows
  activeStatus: localStorage.getItem(STATUS_TAB_KEY) || 'All',
  autoAccepted: new Set(),                                          // bcBidIds we already POSTed accept for this session
  colWidths: JSON.parse(localStorage.getItem(COL_WIDTHS_KEY) || '{}'),
};
function saveActiveStatus() { localStorage.setItem(STATUS_TAB_KEY, STATE.activeStatus); }
function saveColWidths()    { localStorage.setItem(COL_WIDTHS_KEY, JSON.stringify(STATE.colWidths)); }

const STATUS_ORDER = ['Undecided', 'Accepted', 'Submitted', 'Won', 'Archived', 'Lost'];

async function load() {
  $('meta').textContent = 'loading...';
  try {
    const data = await api('GET', '/api/bc/leads-summary');
    STATE.data = data;
    render();
    $('meta').textContent = `${data.summary.total} RFPs · last list scrape ${fmt(data.summary.lastListScrape)} · last detail scrape ${fmt(data.summary.lastDetailScrape)}`;
  } catch (e) {
    $('meta').textContent = 'error loading';
    toast(e.message, 5000);
  }
}

function renderHead() {
  const cells = COLS.map(c => {
    const ind = STATE.sort.col === c.id ? (STATE.sort.dir === 'asc' ? '▲' : '▼') : '';
    const w   = STATE.colWidths[c.id] ? ` style="width:${STATE.colWidths[c.id]}px"` : '';
    return `<th data-col="${c.id}"${w}>${c.label}<span class="sort-ind">${ind}</span><span class="col-resizer" data-col="${c.id}"></span></th>`;
  }).join('');
  $('head').innerHTML = cells;
  $('head').querySelectorAll('th').forEach(th => {
    th.addEventListener('click', (e) => {
      // Ignore clicks that came from the resizer handle.
      if (e.target.classList && e.target.classList.contains('col-resizer')) return;
      const id = th.dataset.col;
      if (STATE.sort.col === id) STATE.sort.dir = (STATE.sort.dir === 'asc' ? 'desc' : 'asc');
      else { STATE.sort.col = id; STATE.sort.dir = (id === 'lastfile' ? 'desc' : 'asc'); }
      render();
    });
  });
  // Drag-resize: mousedown on .col-resizer captures pointer move; commit on mouseup.
  $('head').querySelectorAll('.col-resizer').forEach(handle => {
    handle.addEventListener('mousedown', (downEvt) => {
      downEvt.preventDefault(); downEvt.stopPropagation();
      const th = handle.closest('th');
      const id = handle.dataset.col;
      const startX = downEvt.clientX;
      const startW = th.offsetWidth;
      handle.classList.add('dragging');
      const onMove = (ev) => {
        const next = Math.max(60, startW + (ev.clientX - startX));
        th.style.width = next + 'px';
        STATE.colWidths[id] = next;
      };
      const onUp = () => {
        handle.classList.remove('dragging');
        saveColWidths();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    });
  });
}

function render() {
  if (!STATE.data) return;
  renderHead();

  // Summary chips -- TOTAL + cost only; per-status counts live on the
  // status-pills band below so they aren't duplicated here.
  const chips = [];
  chips.push(`<span class="chip"><strong>${STATE.data.summary.total}</strong> total</span>`);
  // Compound AI spend across every item (sums regardless of which status filter is active).
  let totalCost = 0; let totalTokens = 0; let acceptedCount = 0;
  for (const r of STATE.data.items) {
    if (r.ai?.costUsd) totalCost += Number(r.ai.costUsd);
    if (r.ai?.tokensUsed) totalTokens += Number(r.ai.tokensUsed);
    if (r.extraction?.accepted) acceptedCount++;
  }
  chips.push(`<span class="chip" title="Compound Anthropic spend across every RFP, all statuses">💰 <strong>$${totalCost.toFixed(4)}</strong> AI · ${(totalTokens/1000).toFixed(1)}k tok</span>`);
  if (acceptedCount > 0) chips.push(`<span class="chip">✓ <strong>${acceptedCount}</strong> accepted</span>`);
  $('summary').innerHTML = chips.join('');

  // Status filter pills (replace the old in-table group headers). Counts include the "All" virtual tab.
  const counts = { All: STATE.data.items.length };
  for (const r of STATE.data.items) {
    const s = r.status || 'Unknown';
    counts[s] = (counts[s] || 0) + 1;
  }
  const tabsOrder = ['All', ...STATUS_ORDER.filter(s => counts[s]),
                     ...Object.keys(counts).filter(s => s !== 'All' && !STATUS_ORDER.includes(s)).sort()];
  $('status-pills').innerHTML = tabsOrder.map(s => {
    const active = s === STATE.activeStatus ? ' active' : '';
    return `<button class="status-pill${active}" data-status-tab="${safeHtml(s)}">${safeHtml(s)}<span class="count">${counts[s] || 0}</span></button>`;
  }).join('');
  $('status-pills').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      STATE.activeStatus = btn.dataset.statusTab;
      saveActiveStatus();
      render();
    });
  });

  // Filter + sort (single flat list, no group headers).
  const sortFn = (COLS.find(c => c.id === STATE.sort.col) || COLS[0]).sort;
  const dirMul = STATE.sort.dir === 'asc' ? 1 : -1;
  const filtered = STATE.activeStatus === 'All'
    ? STATE.data.items.slice()
    : STATE.data.items.filter(r => (r.status || 'Unknown') === STATE.activeStatus);
  filtered.sort((a,b) => sortFn(a,b) * dirMul);

  const html = [];
  for (const r of filtered) {
    const open = STATE.open.has(r.bcBidId);
    html.push(`<tr class="row${open ? ' open' : ''}" data-id="${r.bcBidId}">` +
      COLS.map(c => `<td>${c.cell(r)}</td>`).join('') + `</tr>`);

    // Expanded sub-panel: action menu, GC meta card (scope chips moved
    // up next to the project name on the main row), counts grid, footer.
    const gcCell = r.gc ? safeHtml(r.gc) : '<span class="pad">unknown</span>';
    const meta = `<div class="row-meta-card">
      <div class="field"><span class="lbl">GC / Client</span><span class="val">${gcCell}</span></div>
    </div>`;
    const footer = `<div class="row-footer">First seen ${fmt(r.firstSeenAt)} · last list scrape ${fmt(r.lastSeenAt)}</div>`;
    html.push(`<tr class="counts${open ? ' open' : ''}" data-counts-for="${r.bcBidId}" data-stop><td colspan="${COLS.length}" data-stop>
      <div class="row-actions-bar">${actionsCell(r)}</div>
      ${meta}
      ${countsGrid(r.counts, r.extraction?.confidencePct)}
      ${footer}
    </td></tr>`);
  }
  $('rows').innerHTML = html.join('');
  $('empty').hidden = filtered.length > 0;

  $('rows').querySelectorAll('tr.row').forEach(tr => {
    tr.addEventListener('click', (e) => {
      // Don't toggle the row when the click came from inside the actions cell
      // or from a folder/BC link — those have their own handlers.
      if (e.target.closest('[data-stop]') || e.target.closest('a[data-act]')) return;
      const id = tr.dataset.id;
      if (STATE.open.has(id)) STATE.open.delete(id);
      else                    STATE.open.add(id);
      tr.classList.toggle('open');
      const sub = $('rows').querySelector(`tr.counts[data-counts-for="${id}"]`);
      if (sub) sub.classList.toggle('open');
    });
  });
  // Folder + BC project-name links use window.open: Chrome --app windows
  // silently swallow target="_blank" navigations from <a> tags, so we
  // intercept the click and call window.open() ourselves. Folder icon is
  // now a <span> (not an <a>) so it can sit inline with the project name.
  $('rows').querySelectorAll('[data-act="open-folder"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const fid = el.dataset.folderId;
      if (fid) window.open(`https://drive.google.com/drive/folders/${fid}`, '_blank', 'noopener,noreferrer');
    });
  });
  $('rows').querySelectorAll('a[data-act="open-bc"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const href = a.dataset.href;
      if (href) window.open(href, '_blank', 'noopener,noreferrer');
    });
  });
  $('rows').querySelectorAll('a[data-act="open-maps"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const href = a.dataset.href;
      if (href) window.open(href, '_blank', 'noopener,noreferrer');
    });
  });
  // Counts grid: toggle "Show all" / "Hide non-scope".
  $('rows').querySelectorAll('button[data-act="toggle-show-empty"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const grid = btn.closest('.counts-toolbar')?.nextElementSibling;
      if (!grid) return;
      const willShow = !grid.classList.contains('show-empty');
      grid.classList.toggle('show-empty', willShow);
      btn.classList.toggle('active', willShow);
      const empties = grid.querySelectorAll('.count-pill.empty').length;
      btn.textContent = willShow ? 'Hide non-scope' : `Show all (${empties})`;
    });
  });
  // Open / close the Actions dropdown.
  $('rows').querySelectorAll('button.menu-trigger').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wrap = btn.closest('.action-menu');
      const wasOpen = wrap.classList.contains('open');
      // Close every other menu first
      document.querySelectorAll('.action-menu.open').forEach(m => m.classList.remove('open'));
      if (!wasOpen) wrap.classList.add('open');
    });
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.action-menu')) {
      document.querySelectorAll('.action-menu.open').forEach(m => m.classList.remove('open'));
    }
  });

  // Move-to-status select (lives inside the action menu)
  $('rows').querySelectorAll('select[data-act="move-status"]').forEach(sel => {
    sel.addEventListener('change', async (e) => {
      e.stopPropagation();
      const id = sel.dataset.id;
      const v  = sel.value;
      if (!v) return;
      sel.disabled = true;
      try {
        await api('POST', '/api/bc/extraction/move-status', { bcBidId: id, newStatus: v });
        toast(`Moved ${id.slice(0,8)}… to ${v}`);
        setTimeout(load, 800);
      } catch (err) { toast(err.message, 4500); }
      finally { sel.disabled = false; }
    });
  });

  // Action buttons (everything inside the dropdown menu + next-step button on the project tooltip)
  $('rows').querySelectorAll('button[data-act]').forEach(btn => {
    if (btn.classList.contains('menu-trigger')) return;
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const act = btn.dataset.act, id = btn.dataset.id;
      btn.disabled = true; const orig = btn.innerHTML; btn.textContent = '…';
      try {
        if (act === 'extract-more') {
          await api('POST', '/api/bc/extraction/extract-more', { bcBidId: id });
          toast(`Deeper extraction queued for ${id.slice(0,8)}…`);
          setTimeout(load, 1200);
        } else if (act === 'accept') {
          await api('POST', '/api/bc/extraction/accept', { bcBidId: id });
          toast(`Extraction accepted for ${id.slice(0,8)}…`);
          setTimeout(load, 1500); return;
        } else if (act === 'pause-toggle') {
          const willBePaused = btn.dataset.paused !== '1';
          await api('POST', '/api/bc/extraction/pause', { bcBidId: id, paused: willBePaused });
          toast(`${willBePaused ? 'Paused' : 'Resumed'} extraction for ${id.slice(0,8)}…`);
          setTimeout(load, 800); return;
        } else if (act === 'project-details') {
          const r = (STATE.data.items || []).find(x => x.bcBidId === id);
          showProjectDetails(r);
        } else if (act === 'view-prop') {
          const resp = await api('GET', '/api/bc/proposal-folder?bcBidId=' + encodeURIComponent(id));
          if (resp && resp.url) window.open(resp.url, '_blank', 'noopener,noreferrer');
          else toast('No proposal folder yet for this RFP.', 4000);
        } else if (act === 'scan-addenda') {
          const r = (STATE.data.items || []).find(x => x.bcBidId === id);
          if (!r?.addendaSeen) {
            toast('No new addendum detected during the last BC scrape.', 3500);
          } else if (confirm('A new addendum was detected. Re-extract and move this job back to Accepted with an "Addendum-" name prefix?')) {
            await api('POST', '/api/bc/extraction/process-addendum', { bcBidId: id });
            toast('Addendum queued: re-extracting and moving to Accepted.', 4000);
            setTimeout(load, 1500); return;
          }
        } else if (act === 'rescan-details') {
          await api('POST', '/api/bc/extraction/rescan-details', { bcBidId: id });
          toast(`Rescan project details queued for ${id.slice(0,8)}…`);
        } else if (act === 'delete') {
          if (confirm('Delete this RFP from GCC Manager? This wipes dbo.BcRfps + Details + Attachments. Drive folder is left alone. Cannot be undone.')) {
            await api('POST', '/api/bc/extraction/delete', { bcBidId: id });
            toast(`RFP ${id.slice(0,8)}… deleted`);
            setTimeout(load, 800); return;
          }
        } else if (act === 'next-step') {
          // Forwards to the actual underlying action.
          const real = btn.dataset.stepAct;
          const r = (STATE.data.items || []).find(x => x.bcBidId === id);
          if (real === 'extract-more')        { await api('POST', '/api/bc/extraction/extract-more', { bcBidId: id });  toast('Deeper extraction queued.'); setTimeout(load, 1200); }
          else if (real === 'rescan-details') { await api('POST', '/api/bc/extraction/rescan-details', { bcBidId: id }); toast('Rescan queued.'); }
          else if (real === 'accept')         { await api('POST', '/api/bc/extraction/accept', { bcBidId: id });          toast('Extraction accepted.'); setTimeout(load, 1500); }
          else if (real === 'pause-toggle')   { await api('POST', '/api/bc/extraction/pause', { bcBidId: id, paused: false }); toast('Resumed.'); setTimeout(load, 800); }
          else { toast(`Unknown next-step action: ${real}`, 4000); }
        }
      } catch (err) { toast(err.message, 4500); }
      finally      { btn.disabled = false; if (btn.textContent === '…') btn.innerHTML = orig; }
    });
  });

  // Auto-accept disabled per operator preference: every accept must be a
  // deliberate human action (Actions ▾ -> Accept) since the new
  // confidence-cap policy means "≥90% confidence" no longer guarantees a
  // fully-reconciled extraction. Leaving the AUTO badge logic in the
  // Extraction column so that a manual eyeball can still spot eligible rows.
  if (false) for (const r of STATE.data.items) {
    const c = r.extraction?.confidencePct;
    if (c == null || c < 90) continue;
    if (r.extraction?.accepted) continue;
    if (r.extractionPaused) continue;
    if (STATE.autoAccepted.has(r.bcBidId)) continue;
    STATE.autoAccepted.add(r.bcBidId);
    api('POST', '/api/bc/extraction/accept', { bcBidId: r.bcBidId })
      .then(() => toast(`Auto-accepted ${r.bcBidId.slice(0,8)}… at ${Math.round(c)}% confidence`))
      .catch(e => toast(`Auto-accept failed: ${e.message}`, 4500));
  }
}

// ===== Project Details modal (Undecided action) =====
function showProjectDetails(r) {
  if (!r) return;
  const m = $('modal');
  const trades = Array.isArray(r.trades) && r.trades.length
    ? r.trades.map(t => `<span class="scope-chip"><span class="ico">${tradeIcon(t)}</span>${safeHtml(t)}</span>`).join('')
    : '<span class="scope-chip unknown">scope: unknown</span>';
  const desc = r.description && r.description.trim()
    ? safeHtml(r.description)
    : '<em>No description scraped from BC yet. Force a detail rescan to populate.</em>';
  m.hidden = false;
  m.innerHTML = `<div class="modal-bg" data-close="1"><div class="modal" onclick="event.stopPropagation()">
    <button class="close" data-close="1">×</button>
    <h2>${safeHtml(projectLabel(r))}</h2>
    <div class="sub">${safeHtml(r.gc || 'unknown GC')} · ${safeHtml(r.location || 'no location')} · due ${safeHtml(r.dueAt || '—')}</div>
    <div class="meta-row">${trades}</div>
    <div class="body">${desc}</div>
  </div></div>`;
  m.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => { m.hidden = true; m.innerHTML = ''; }));
}

// ===== Processes tab =====
async function loadProcesses() {
  try {
    const data = await api('GET', '/api/admin/scheduled-tasks');
    const tasks = data.tasks || [];
    $('proc-count').textContent = tasks.length;
    const running = tasks.filter(t => (t.state || '').toLowerCase() === 'running').length;
    if (running > 0) { $('proc-running').textContent = running; $('proc-running-chip').style.display = ''; }
    else             { $('proc-running-chip').style.display = 'none'; }
    const stateBadge = (s) => {
      const v = (s || '').toLowerCase();
      if (v === 'ready')    return '<span class="status status-Accepted">Ready</span>';
      if (v === 'running')  return '<span class="status status-Won">Running</span>';
      if (v === 'disabled') return '<span class="status status-Archived">Paused</span>';
      return `<span class="status status-Unknown">${s || '?'}</span>`;
    };
    const html = tasks.map(t => {
      const isPaused  = (t.state || '').toLowerCase() === 'disabled';
      const isRunning = (t.state || '').toLowerCase() === 'running';
      return `<tr>
        <td><strong>${t.name}</strong>${t.description ? `<div class="small">${t.description}</div>` : ''}</td>
        <td>${stateBadge(t.state)}</td>
        <td class="small">${t.lastRunAt ? fmt(t.lastRunAt) : '<span class="pad">—</span>'}</td>
        <td class="small">${t.nextRunAt ? fmt(t.nextRunAt) : '<span class="pad">—</span>'}</td>
        <td class="small">${t.lastResultText || `<code>${t.lastResultCode ?? ''}</code>`}</td>
        <td>
          <div class="row-actions">
            <button data-task="${t.name}" data-act="run"     ${isRunning ? 'disabled' : ''}>${isRunning ? 'running' : 'Start'}</button>
            <button data-task="${t.name}" data-act="${isPaused ? 'enable' : 'disable'}">${isPaused ? 'Resume' : 'Pause'}</button>
          </div>
        </td>
      </tr>`;
    }).join('');
    $('proc-rows').innerHTML = html || `<tr><td colspan="6" style="text-align:center;color:var(--slate);padding:30px">No scheduled tasks discovered.</td></tr>`;
    // Wire buttons.
    $('proc-rows').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.task, act = btn.dataset.act;
        btn.disabled = true; const orig = btn.textContent; btn.textContent = '…';
        try {
          if (act === 'run') {
            await api('POST', '/api/admin/scheduled-tasks/run', { name });
            toast(`Started ${name}`);
          } else {
            await api('POST', '/api/admin/scheduled-tasks/toggle', { name, enable: act === 'enable' });
            toast(`${act === 'enable' ? 'Resumed' : 'Paused'} ${name}`);
          }
        } catch (e) { toast(e.message, 4500); }
        finally    { btn.disabled = false; btn.textContent = orig; loadProcesses(); }
      });
    });
  } catch (e) {
    $('proc-rows').innerHTML = `<tr><td colspan="6" style="padding:20px;color:var(--danger)">${e.message}</td></tr>`;
  }
}

// ===== Tab switching =====
$('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  $('tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const which = btn.dataset.tab;
  $('tab-leads').hidden     = (which !== 'leads');
  $('tab-processes').hidden = (which !== 'processes');
  $('rescan').style.display = (which === 'leads') ? '' : 'none';
  if (which === 'processes') loadProcesses();
});

// Refresh: just refetch leads-summary (no BC scrape, no Pub/Sub fanout).
$('refresh').addEventListener('click', async () => {
  const btn = $('refresh');
  btn.disabled = true; const orig = btn.textContent; btn.textContent = '↻ refreshing…';
  try { await load(); toast('Refreshed.'); }
  catch (e) { toast(e.message, 5000); }
  finally   { btn.disabled = false; btn.textContent = orig; }
});

$('rescan').addEventListener('click', async () => {
  const btn = $('rescan');
  btn.disabled = true;
  btn.textContent = 'firing...';
  try {
    const r = await api('POST', '/api/bc/rescan-now', {});
    toast(`Triggered ${r.triggered.length} scheduled tasks. Auto-refreshes every 30s.`, 4500);
  } catch (e) { toast(e.message, 5000); }
  finally {
    btn.disabled = false;
    btn.textContent = 'Rescan now';
  }
  setTimeout(load, 4000);
});

let refreshTimer = null;
function scheduleRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(load, 30000);
  $('auto').textContent = 'auto-refresh every 30s';
}

load();
scheduleRefresh();
</script>
</body>
</html>
