<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GCC Prop Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
  <meta name="theme-color" content="#1E4D2B" />
  <style>
    :root {
      --forest:#1E4D2B; --gold:#C9A158; --ink:#1c2a23; --slate:#475a51;
      --cream:#FDFBF4; --green-tint:#F1F8F1; --line:#dde5df; --danger:#B71C1C;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; }
    body { font:13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Arial; color:var(--ink); background:var(--cream); }

    header { display:flex; align-items:center; justify-content:space-between;
             padding:10px 16px; background:var(--forest); color:white;
             position:sticky; top:0; z-index:6; }
    header h1 { margin:0; font-size:15px; font-weight:600; letter-spacing:.02em; display:flex; align-items:center; gap:8px; }
    header h1 img { height:22px; width:auto; }
    header .meta { font-size:12px; opacity:.85; }
    header button#rescan { background:var(--gold); color:var(--ink); border:0; padding:7px 14px;
                    font-size:12px; font-weight:600; border-radius:4px; cursor:pointer; letter-spacing:.02em; }
    header button#rescan:disabled { opacity:.5; cursor:wait; }

    .tabs { display:flex; gap:4px; }
    .tab { background:transparent; color:rgba(255,255,255,.75); border:0; padding:7px 14px;
           font-size:12px; font-weight:600; border-radius:4px; cursor:pointer; letter-spacing:.02em; }
    .tab.active, .tab:hover { background:rgba(255,255,255,.18); color:white; }

    .row-actions { display:flex; gap:4px; flex-wrap:wrap; }
    .row-actions button {
      background:white; color:var(--forest); border:1px solid var(--line);
      padding:3px 9px; font-size:11px; font-weight:600; border-radius:11px; cursor:pointer;
    }
    .row-actions button:hover { border-color:var(--forest); background:var(--green-tint); }
    .row-actions button.accepted { background:var(--green-tint); border-color:var(--forest); color:var(--forest); }
    .row-actions button:disabled { opacity:.5; cursor:wait; }

    .summary { display:flex; gap:10px; padding:10px 16px; background:white;
               border-bottom:1px solid var(--line); flex-wrap:wrap; position:sticky; top:46px; z-index:5; }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px;
            background:var(--green-tint); border:1px solid var(--line); border-radius:14px; font-size:12px; }
    .chip strong { color:var(--forest); }

    table { border-collapse:collapse; width:100%; background:white; }
    thead th { position:sticky; top:92px; background:var(--cream); border-bottom:2px solid var(--forest);
               padding:8px 10px; font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
               color:var(--slate); text-align:left; z-index:4; cursor:pointer; user-select:none; white-space:nowrap; }
    thead th:hover { background:#f5f1e1; }
    thead th .sort-ind { display:inline-block; width:10px; opacity:.55; margin-left:3px; }
    tbody td { border-bottom:1px solid var(--line); padding:7px 10px; vertical-align:middle; }
    tbody tr.row { cursor:pointer; }
    tbody tr.row:hover { background:var(--green-tint); }
    tbody tr.row .toggle { display:inline-block; width:13px; color:var(--slate); transition:transform .15s; }
    tbody tr.row.open .toggle { transform:rotate(90deg); color:var(--forest); }

    /* Status group header */
    tr.group-hdr td { background:linear-gradient(180deg, var(--green-tint) 0%, white 100%);
                       padding:10px 14px; font-weight:600; color:var(--forest);
                       border-top:1px solid var(--line); border-bottom:1px solid var(--line);
                       letter-spacing:.04em; font-size:12px; text-transform:uppercase;
                       cursor:pointer; user-select:none; }
    tr.group-hdr td:hover { background:linear-gradient(180deg, #E5F1E5 0%, white 100%); }
    tr.group-hdr td .count { font-weight:400; color:var(--slate); margin-left:6px; }
    tr.group-hdr .gtoggle { display:inline-block; width:13px; color:var(--forest); transition:transform .15s; }
    tr.group-hdr.collapsed .gtoggle { transform:rotate(-90deg); }
    /* Scope (trade icons + names) chips next to actions on Undecided rows */
    .scope-chips { display:inline-flex; gap:4px; flex-wrap:wrap; }
    .scope-chip  { display:inline-flex; align-items:center; gap:4px;
                   padding:2px 8px; border:1px solid var(--line); border-radius:11px;
                   background:white; color:var(--slate); font-size:11px; font-weight:500; }
    .scope-chip .ico { font-size:13px; line-height:1; }
    .scope-chip.unknown { color:#999; font-style:italic; }
    /* Submitted "Scan Addenda" red flag when an addendum is detected. */
    .row-actions button.danger {
      background:#FFEBEE; color:var(--danger); border-color:#F4CCCC;
      font-weight:700; animation:pulseRed 1.4s ease-in-out infinite;
    }
    .row-actions button.danger:hover { background:#FFCDD2; }
    @keyframes pulseRed { 0%,100% { box-shadow:0 0 0 0 rgba(183,28,28,.0); }
                          50%     { box-shadow:0 0 0 4px rgba(183,28,28,.18); } }
    .row-actions button.paused {
      background:#FFF8E1; color:#7A5A00; border-color:#F0DEA0;
    }
    .extraction-auto { display:inline-block; margin-left:6px; padding:1px 6px;
                       background:var(--gold); color:var(--ink); border-radius:8px;
                       font-size:10px; font-weight:600; letter-spacing:.04em; }
    /* Project Details modal */
    .modal-bg { position:fixed; inset:0; background:rgba(28,42,35,.55); z-index:50;
                display:flex; align-items:center; justify-content:center; }
    .modal    { background:white; max-width:720px; width:92%; max-height:80vh; overflow:auto;
                border-radius:8px; box-shadow:0 10px 40px rgba(0,0,0,.3); padding:22px 26px; }
    .modal h2 { margin:0 0 4px; color:var(--forest); font-size:18px; }
    .modal .sub { color:var(--slate); font-size:12px; margin-bottom:14px; }
    .modal .body { white-space:pre-wrap; font-size:13px; color:var(--ink); line-height:1.55; }
    .modal .body em { color:var(--slate); font-style:italic; }
    .modal .close { float:right; background:transparent; border:0; font-size:18px; color:var(--slate); cursor:pointer; padding:0 4px; }
    .modal .meta-row { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 6px; }

    .status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; white-space:nowrap; }
    .status-Undecided { background:#FFF4D8; color:#7A5A00; }
    .status-Accepted  { background:#D9EAD3; color:var(--forest); }
    .status-Submitted { background:#CFE2F3; color:#1A5490; }
    .status-Won       { background:var(--gold); color:var(--ink); }
    .status-Archived  { background:#EEE; color:#666; }
    .status-Lost      { background:#F4CCCC; color:var(--danger); }
    .ok  { color:var(--forest); font-weight:600; }
    .pad { color:#aaa; font-style:italic; }
    .small { font-size:11px; color:var(--slate); }
    a { color:var(--forest); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .folder-link { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border:1px solid var(--line); border-radius:12px; font-size:11px; background:white; }
    .folder-link:hover { background:var(--green-tint); border-color:var(--forest); }
    .loc-link { color:var(--slate); text-decoration:none; cursor:pointer; border-bottom:1px dotted var(--line); }
    .loc-link:hover { color:var(--forest); border-bottom-color:var(--forest); text-decoration:none; }

    /* Drop counts sub-row (default hidden — toggled) */
    tr.counts { display:none; }
    tr.counts.open { display:table-row; }
    tr.counts td { background:var(--cream); padding:8px 14px 14px; border-bottom:2px solid var(--line); }
    .counts-grid { display:grid; grid-template-columns:repeat(10, 1fr); gap:6px; }
    .count-pill { display:flex; align-items:center; justify-content:space-between; gap:6px;
                  padding:5px 10px; border:1px solid var(--line); border-radius:14px;
                  background:white; font-size:11px; color:var(--slate); }
    .count-pill .lbl { font-weight:600; letter-spacing:.04em; text-transform:uppercase; font-size:10px; }
    .count-pill .val { font-weight:700; color:var(--ink); min-width:18px; text-align:right; }
    .count-pill.empty { opacity:.45; }
    .count-pill.has   { border-color:var(--forest); background:var(--green-tint); }
    /* By default only the "has" pills are shown; the "Show all" toggle reveals
       the rest in case manual edits are needed for non-scope-related categories. */
    .counts-grid:not(.show-empty) .count-pill.empty { display:none; }
    .counts-toolbar { display:flex; justify-content:space-between; align-items:center;
                      margin-bottom:6px; gap:8px; }
    .counts-toolbar .show-all { background:transparent; border:0; color:var(--slate);
                                font-size:11px; cursor:pointer; padding:2px 6px;
                                border-radius:8px; }
    .counts-toolbar .show-all:hover { background:var(--green-tint); color:var(--forest); }
    .counts-toolbar .show-all.active { background:var(--forest); color:white; }
    .due-overdue { color:var(--danger); font-weight:600; }

    .progress-bar { display:inline-block; width:70px; height:6px; background:var(--line);
                    border-radius:3px; overflow:hidden; vertical-align:middle; margin-right:5px; }
    .progress-bar > span { display:block; height:100%; background:var(--forest); }

    @media (max-width:1100px) { .counts-grid { grid-template-columns:repeat(5, 1fr); } }
    #status-bar { position:fixed; right:14px; bottom:10px; background:var(--ink); color:white;
                  padding:6px 12px; border-radius:14px; font-size:11px; opacity:0;
                  transition:opacity .15s; pointer-events:none; }
    #status-bar.show { opacity:.92; }
    #empty { padding:60px 20px; text-align:center; color:var(--slate); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1><img src="/assets/img/gcc-logo-128.png" alt="GCC" />GCC Prop Manager</h1>
      <div class="meta" id="meta">loading...</div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="leads">BC Leads</button>
      <button class="tab" data-tab="processes">Processes</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="small" id="auto" style="color:rgba(255,255,255,.7)"></span>
      <button id="rescan">Rescan now</button>
    </div>
  </header>

  <!-- =================== Leads tab =================== -->
  <section id="tab-leads">
    <div class="summary" id="summary"></div>
    <table id="t">
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" hidden>No RFPs scraped yet. Click "Rescan now" to trigger a fresh pull.</div>
  </section>

  <!-- =================== Processes tab =================== -->
  <section id="tab-processes" hidden>
    <div class="summary"><span class="chip"><strong id="proc-count">0</strong> automated processes</span><span class="chip" id="proc-running-chip" style="display:none">⚙️ <strong id="proc-running">0</strong> running now</span></div>
    <table id="proc-table">
      <thead>
        <tr>
          <th style="cursor:default">Task</th>
          <th style="cursor:default">State</th>
          <th style="cursor:default">Last run</th>
          <th style="cursor:default">Next run</th>
          <th style="cursor:default">Last result</th>
          <th style="cursor:default">Actions</th>
        </tr>
      </thead>
      <tbody id="proc-rows"></tbody>
    </table>
  </section>

  <div id="status-bar"></div>

  <!-- Project Details modal: surfaced by the Undecided row "Project Details" button. -->
  <div id="modal" hidden></div>

<script>
'use strict';

// Map of BC trade-name fragments -> emoji icon. Drives the scope chips on
// Undecided rows. Order matters; the first match wins.
const TRADE_ICONS = [
  [/data|voice|low.?volt|telecom|communic/i,           '📡'],
  [/fiber/i,                                            '🧵'],
  [/security|access\s*control|intrusion/i,              '🔐'],
  [/camera|surveill|cctv|video/i,                       '📹'],
  [/audio|av\b|a\/v/i,                                  '🎚️'],
  [/fire|alarm|life.?safety/i,                          '🚨'],
  [/intercom/i,                                         '📞'],
  [/tv\b|display|signage/i,                             '📺'],
  [/electric/i,                                         '⚡'],
  [/network|wifi|wi-?fi|wlan|wireless/i,                '📶'],
  [/cabling|wiring|raceway|conduit/i,                   '🔌'],
  [/door|opening|hardware/i,                            '🚪'],
  [/general|gc\b|construction|civil/i,                  '🏗️'],
  [/demolition|demo\b/i,                                '🔨'],
];
function tradeIcon(label) {
  for (const [re, ico] of TRADE_ICONS) if (re.test(label || '')) return ico;
  return '🔧';
}

// Reduce a free-form address to "City, ST" for the Location column. The full
// string still lives on the link's title attribute for hover, and is what
// gets sent to Google Maps. BC sometimes hands us the bare "City, ST", and
// sometimes a full street address with ZIP and country tacked on.
function compactLocation(loc) {
  if (!loc) return '';
  const s = loc.trim().replace(/,\s*United States.*$/i, '').replace(/\s+/g, ' ');
  // Already compact -- "City, ST" or "City, State"
  if (/^[^,]+,\s*([A-Z]{2}|[A-Za-z]{3,})\s*$/.test(s)) return s;
  // Pattern: "...something..., City, ST 12345" -- pull the last "City, ST"
  const m = s.match(/,\s*([^,]+?),\s*([A-Z]{2})(?:\s+\d{4,5}(?:-\d{4})?)?\s*$/);
  if (m) return `${m[1].trim()}, ${m[2]}`;
  // Pattern: "City, ST 12345" with no street prefix
  const m2 = s.match(/^([^,]+?),\s*([A-Z]{2})(?:\s+\d{4,5})?\s*$/);
  if (m2) return `${m2[1].trim()}, ${m2[2]}`;
  return s;
}

// Auth: ?secret= on the URL (set by the tray launcher) OR localStorage fallback.
const URL_PARAMS = new URLSearchParams(location.search);
const SECRET = URL_PARAMS.get('secret') || localStorage.getItem('gccAdminSecret') || '';
if (URL_PARAMS.get('secret')) localStorage.setItem('gccAdminSecret', URL_PARAMS.get('secret'));

// API base: same origin by default; override with ?api=... for local-host probes.
const API_BASE = URL_PARAMS.get('api') || ('https://api.' + location.hostname.replace(/^www\./, '').replace(/^staff\./, ''));

const $  = (id) => document.getElementById(id);
const fmt = (d) => d ? new Date(d).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
const fmtDate = (d) => d ? new Date(d).toLocaleDateString([], { month:'short', day:'numeric', year:'2-digit' }) : null;
const toast = (msg, ms = 2200) => { const b = $('status-bar'); b.textContent = msg; b.classList.add('show'); setTimeout(() => b.classList.remove('show'), ms); };

async function api(method, path, body = null) {
  if (!SECRET) throw new Error('No admin secret. Re-launch from the tray icon, or paste your secret into localStorage.gccAdminSecret.');
  const opts = { method, headers: { 'X-Gcc-Admin-Secret': SECRET, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  const text = await res.text();
  if (!res.ok) throw new Error(`${method} ${path} -> ${res.status}: ${text.slice(0, 300)}`);
  return text ? JSON.parse(text) : {};
}

function statusBadge(s) {
  const safe = (s || '').replace(/[^A-Za-z]/g, '') || 'Unknown';
  return `<span class="status status-${safe}">${s || '—'}</span>`;
}

// ===== columns =====
// `key` = sort key on the row object;  `accessor(r)` returns the rendered HTML.
// projectLabel = the bare site name from BC (no date prefix, no city suffix,
// no trade-scope suffix). `driveJobFolderName` encodes "{date} - {project} - {city}"
// and gets shown in the Folder column tooltip; the Project column wants the
// site name only with the trade-scope trailer ("Electrical",
// "Data & Telecommunications", "Visual Display Boards", etc.) stripped --
// scope already appears as chips on Undecided rows.
const SCOPE_TRAILER = /\s+(?:Data\s*(?:&|and)\s*Telecommunications|Voice\s*&\s*Data|Visual\s*Display\s*Boards?|Visual\s*Displays?|Low[\s-]?Voltage|Audio[\s\/-]?Visual|Telecommunications?|Communications?|Structured\s*Cabling|Cabling|Networking|Network|Electrical|Security|Fire\s*Alarm|Access\s*Control|Intercom|Paging|Sound\s*System|Datacom|Data|Telecom|AV)\s*$/i;
function trimScope(name) {
  if (!name) return '';
  let s = name.replace(SCOPE_TRAILER, '').trim();
  s = s.replace(/[\s\-–—,/\\]+$/, '').trim();   // dangling punctuation left by the cut
  return s || name;                              // never collapse to empty
}
function projectLabel(r) { return trimScope(r.projectName) || r.driveJobFolderName || '(no name)'; }

// safeHtml: escape user-controlled strings before injecting into innerHTML.
function safeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

const COLS = [
  { id:'project', label:'Project',
    sort:(a,b) => projectLabel(a).localeCompare(projectLabel(b)),
    cell:(r) => `<span class="toggle">▶</span> <a href="${r.href || '#'}" data-act="open-bc" data-href="${r.href || ''}">${safeHtml(projectLabel(r))}</a>` },

  { id:'gc', label:'GC / Client',
    sort:(a,b) => (a.gc || '').localeCompare(b.gc || ''),
    cell:(r) => r.gc ? `<span>${safeHtml(r.gc)}</span>` : '<span class="pad">unknown</span>' },

  { id:'location', label:'Location',
    sort:(a,b) => (a.location || '').localeCompare(b.location || ''),
    cell:(r) => {
      if (!r.location) return '<span class="pad">—</span>';
      const compact = compactLocation(r.location);
      const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.location)}`;
      return `<a class="loc-link small" data-act="open-maps" data-href="${url}" title="${safeHtml(r.location)}">${safeHtml(compact)}</a>`;
    } },

  { id:'due', label:'Due',
    sort:(a,b) => (parseDue(a.dueAt) || 0) - (parseDue(b.dueAt) || 0),
    cell:(r) => renderDue(r.dueAt) },

  { id:'uploads', label:'Uploads',
    sort:(a,b) => (a.scrape?.attachmentsCount || 0) - (b.scrape?.attachmentsCount || 0),
    cell:(r) => uploadsCell(r.scrape) },

  { id:'extraction', label:'Extraction',
    sort:(a,b) => (a.extraction?.confidencePct || 0) - (b.extraction?.confidencePct || 0),
    cell:(r) => {
      const c = r.extraction?.confidencePct;
      if (c == null) return '<span class="pad">—</span>';
      const auto = c >= 90 ? '<span class="extraction-auto" title="Auto-accepted at ≥90% confidence">AUTO</span>' : '';
      const files = r.extraction?.filesProcessed ? ` <span class="small">(${r.extraction.filesProcessed} files)</span>` : '';
      return `<strong>${Math.round(c)}%</strong>${files}${auto}`;
    } },

  { id:'cost', label:'AI cost',
    sort:(a,b) => (a.ai?.costUsd || 0) - (b.ai?.costUsd || 0),
    cell:(r) => {
      const c = r.ai?.costUsd;
      return c == null ? '<span class="pad">—</span>' :
        `$${Number(c).toFixed(4)}${r.ai?.tokensUsed ? ` <span class="small">(${(r.ai.tokensUsed/1000).toFixed(1)}k tok)</span>` : ''}`;
    } },

  { id:'folder', label:'Folder',
    sort:(a,b) => (a.driveJobFolderName || '').localeCompare(b.driveJobFolderName || ''),
    cell:(r) => r.driveJobFolderId
      ? `<a class="folder-link" data-act="open-folder" data-folder-id="${r.driveJobFolderId}" title="${safeHtml(r.driveJobFolderName || '')}">📂 Open</a>`
      : '<span class="pad">no folder</span>' },

  { id:'added', label:'Added',
    sort:(a,b) => new Date(a.firstSeenAt || 0) - new Date(b.firstSeenAt || 0),
    cell:(r) => `<span class="small">${fmt(r.firstSeenAt)}</span>` },

  { id:'lastseen', label:'Last seen',
    sort:(a,b) => new Date(a.lastSeenAt || 0) - new Date(b.lastSeenAt || 0),
    cell:(r) => `<span class="small">${fmt(r.lastSeenAt)}</span>` },

  { id:'actions', label:'Actions', sort:(a,b) => 0, cell:(r) => actionsCell(r) },
];

// ===== status-aware action cell =====
// Per the workflow:
//   Undecided  -> "Project Details" + scope chips (icons + trade names from BC)
//   Accepted   -> "Extract more" + "Accept" + "Pause" / "Resume" toggle
//   Submitted  -> "View Prop" (latest sent proposal folder) + "Scan Addenda"
//                 ("Scan Addenda" pulses red when an addendum has appeared since
//                  acceptance; click re-extracts and moves the job back to Accepted
//                  with an "Addendum-" name prefix.)
//   Won/Lost/Archived -> View Prop only (read-only).
function actionsCell(r) {
  const id = r.bcBidId;
  const accepted = r.extraction?.accepted;
  const paused   = r.extractionPaused;
  const status   = r.status || 'Unknown';

  if (status === 'Undecided') {
    const trades = Array.isArray(r.trades) && r.trades.length
      ? r.trades.map(t => `<span class="scope-chip"><span class="ico">${tradeIcon(t)}</span>${safeHtml(t)}</span>`).join('')
      : '<span class="scope-chip unknown">scope: unknown</span>';
    return `<div class="row-actions" data-stop>
      <button data-act="project-details" data-id="${id}" title="Show project summary pulled from BC">📋 Project Details</button>
      <span class="scope-chips">${trades}</span>
    </div>`;
  }
  if (status === 'Accepted') {
    return `<div class="row-actions" data-stop>
      <button data-act="extract-more" data-id="${id}" title="Re-run extraction with deeper parsing pass">Extract more</button>
      <button data-act="accept" data-id="${id}" class="${accepted ? 'accepted' : ''}" title="${accepted ? 'Already accepted' : 'Mark this extraction as approved'}">${accepted ? '✓ accepted' : 'Accept'}</button>
      <button data-act="pause-toggle" data-id="${id}" data-paused="${paused ? '1' : '0'}" class="${paused ? 'paused' : ''}" title="${paused ? 'Resume extraction for this RFP' : 'Pause: bid-extractor will skip this RFP'}">${paused ? '▶ Resume' : '⏸ Pause'}</button>
    </div>`;
  }
  if (status === 'Submitted') {
    const flagged = !!r.addendaSeen;
    return `<div class="row-actions" data-stop>
      <button data-act="view-prop" data-id="${id}" title="Open the folder of the latest sent proposal">📤 View Prop</button>
      <button data-act="scan-addenda" data-id="${id}" class="${flagged ? 'danger' : ''}" title="${flagged ? 'NEW addendum detected — click to re-extract and move back to Accepted' : 'Scan BC for new addenda'}">${flagged ? '⚠ Scan Addenda' : 'Scan Addenda'}</button>
    </div>`;
  }
  // Won/Lost/Archived: read-only — only "View Prop" if a proposal exists.
  return `<div class="row-actions" data-stop>
    <button data-act="view-prop" data-id="${id}" title="Open the folder of the latest sent proposal">📤 View Prop</button>
  </div>`;
}

const COUNT_KEYS = [
  ['data','DATA'],     ['fiber','FIBER'],   ['fiberEnc','FIBER ENC'], ['fiberPp','FIBER PP'], ['coax','COAX'],
  ['hdmi','HDMI'],     ['tv','TV'],         ['iot','IOT'],            ['aps','APS'],          ['intercom','INTERCOM'],
  ['camInt','CAM INT'],['camExt','CAM EXT'],['doors','DOORS'],        ['elevator','ELEVATOR'],['ups','UPS'],
  ['mdf','MDF'],       ['idf','IDF'],       ['switch','SWITCH'],      ['patch','PATCH'],      ['ladder','LADDER'],
];

function countsGrid(counts) {
  if (!counts) counts = {};
  let hasN = 0, emptyN = 0;
  const pills = COUNT_KEYS.map(([k, label]) => {
    const v = counts[k];
    const has = v != null && v !== 0;
    if (has) hasN++; else emptyN++;
    return `<div class="count-pill ${has ? 'has' : 'empty'}"><span class="lbl">${label}</span><span class="val">${v == null ? '—' : v}</span></div>`;
  }).join('');
  // If everything is empty, render the grid in show-all mode by default so
  // a fresh row doesn't look broken; otherwise hide the empties behind a toggle.
  const startShown = hasN === 0;
  const toolbar = `<div class="counts-toolbar">
    <span class="small">${hasN} in scope${emptyN ? ` · ${emptyN} hidden` : ''}</span>
    ${emptyN ? `<button type="button" class="show-all${startShown ? ' active' : ''}" data-act="toggle-show-empty">${startShown ? 'Hide non-scope' : 'Show all (' + emptyN + ')'}</button>` : ''}
  </div>`;
  return `${toolbar}<div class="counts-grid${startShown ? ' show-empty' : ''}">${pills}</div>`;
}

function uploadsCell(scrape) {
  if (!scrape) return '<span class="pad">—</span>';
  const att = scrape.attachmentsCount || 0;
  const msg = scrape.messagesCount || 0;
  const pct = scrape.progressPct == null ? null : Math.round(scrape.progressPct);
  let parts = [];
  if (pct != null) parts.push(`<span class="progress-bar"><span style="width:${pct}%"></span></span><strong>${pct}%</strong>`);
  if (att) parts.push(`<span class="small">${att} att</span>`);
  if (msg) parts.push(`<span class="small">${msg} msg</span>`);
  if (parts.length === 0) parts.push('<span class="pad">none</span>');
  return parts.join(' · ');
}

// Parse the BC dueAt string ("Fri, Jul 19 2025 · 5:00 PM CDT" etc.) to ms.
function parseDue(s) {
  if (!s) return null;
  const t = Date.parse(s.replace(/[·•]/g, ' '));
  return isNaN(t) ? null : t;
}
const DUE_FMT = new Intl.DateTimeFormat([], { month:'short', day:'numeric', year:'numeric' });
function renderDue(s) {
  const t = parseDue(s);
  if (t == null) return s ? `<span class="small">${safeHtml(s)}</span>` : '<span class="pad">—</span>';
  const d = new Date(t);
  const overdue = t < Date.now();
  const cls = overdue ? 'due-overdue' : 'small';
  return `<span class="${cls}">${DUE_FMT.format(d)}</span>`;
}

// ===== state =====
// Persist only collapsed-status across reloads — open count rows and auto-accept
// state are session-scoped. localStorage key namespaced for this app.
const COLLAPSED_KEY = 'gccLeadsCollapsedStatuses';
const STATE = {
  data : null,
  sort : { col: 'added', dir: 'desc' },
  open : new Set(),                                                 // bcBidIds with expanded count rows
  collapsed   : new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '[]')),
  autoAccepted: new Set(),                                          // bcBidIds we already POSTed accept for this session
};
function saveCollapsed() { localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...STATE.collapsed])); }

const STATUS_ORDER = ['Undecided', 'Accepted', 'Submitted', 'Won', 'Archived', 'Lost'];

async function load() {
  $('meta').textContent = 'loading...';
  try {
    const data = await api('GET', '/api/bc/leads-summary');
    STATE.data = data;
    render();
    $('meta').textContent = `${data.summary.total} RFPs · last list scrape ${fmt(data.summary.lastListScrape)} · last detail scrape ${fmt(data.summary.lastDetailScrape)}`;
  } catch (e) {
    $('meta').textContent = 'error loading';
    toast(e.message, 5000);
  }
}

function renderHead() {
  const cells = COLS.map(c => {
    const ind = STATE.sort.col === c.id ? (STATE.sort.dir === 'asc' ? '▲' : '▼') : '';
    return `<th data-col="${c.id}">${c.label}<span class="sort-ind">${ind}</span></th>`;
  }).join('');
  $('head').innerHTML = cells;
  $('head').querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const id = th.dataset.col;
      if (STATE.sort.col === id) STATE.sort.dir = (STATE.sort.dir === 'asc' ? 'desc' : 'asc');
      else { STATE.sort.col = id; STATE.sort.dir = (id === 'added' || id === 'lastseen' ? 'desc' : 'asc'); }
      render();
    });
  });
}

function render() {
  if (!STATE.data) return;
  renderHead();

  // Summary chips -- counts + compound AI cost across ALL items
  const chips = [];
  chips.push(`<span class="chip"><strong>${STATE.data.summary.total}</strong> total</span>`);
  for (const [k, v] of Object.entries(STATE.data.summary.byStatus || {})) {
    chips.push(`<span class="chip">${statusBadge(k)} <strong>${v}</strong></span>`);
  }
  // Compound AI spend across every item (sums regardless of status group sort).
  let totalCost = 0; let totalTokens = 0; let acceptedCount = 0;
  for (const r of STATE.data.items) {
    if (r.ai?.costUsd) totalCost += Number(r.ai.costUsd);
    if (r.ai?.tokensUsed) totalTokens += Number(r.ai.tokensUsed);
    if (r.extraction?.accepted) acceptedCount++;
  }
  chips.push(`<span class="chip" title="Compound Anthropic spend across every RFP, all statuses">💰 <strong>$${totalCost.toFixed(4)}</strong> AI · ${(totalTokens/1000).toFixed(1)}k tok</span>`);
  if (acceptedCount > 0) chips.push(`<span class="chip">✓ <strong>${acceptedCount}</strong> accepted</span>`);
  $('summary').innerHTML = chips.join('');

  // Group by status, sort within each group, render group headers + rows.
  const sortFn = (COLS.find(c => c.id === STATE.sort.col) || COLS[0]).sort;
  const dirMul = STATE.sort.dir === 'asc' ? 1 : -1;
  const groups = {};
  for (const r of STATE.data.items) {
    const s = r.status || 'Unknown';
    (groups[s] = groups[s] || []).push(r);
  }
  // Stable, deterministic group order: known statuses first, then any extras alphabetically.
  const orderedStatuses = [
    ...STATUS_ORDER.filter(s => groups[s]),
    ...Object.keys(groups).filter(s => !STATUS_ORDER.includes(s)).sort(),
  ];

  const html = [];
  for (const s of orderedStatuses) {
    const rows = groups[s].slice().sort((a,b) => sortFn(a,b) * dirMul);
    const isCollapsed = STATE.collapsed.has(s);
    html.push(`<tr class="group-hdr${isCollapsed ? ' collapsed' : ''}" data-status="${s}">
      <td colspan="${COLS.length}"><span class="gtoggle">▼</span> ${statusBadge(s)} <span class="count">${rows.length}</span></td></tr>`);
    if (isCollapsed) continue;     // skip body rows; the group header stays visible
    for (const r of rows) {
      const open = STATE.open.has(r.bcBidId);
      html.push(`<tr class="row${open ? ' open' : ''}" data-id="${r.bcBidId}">` +
        COLS.map(c => `<td>${c.cell(r)}</td>`).join('') +
        `</tr>`);
      html.push(`<tr class="counts${open ? ' open' : ''}" data-counts-for="${r.bcBidId}"><td colspan="${COLS.length}" data-stop>${countsGrid(r.counts)}</td></tr>`);
    }
  }
  $('rows').innerHTML = html.join('');
  $('empty').hidden = STATE.data.items.length > 0;

  // Group-header click: collapse / expand the entire status section.
  $('rows').querySelectorAll('tr.group-hdr').forEach(tr => {
    tr.addEventListener('click', () => {
      const s = tr.dataset.status;
      if (STATE.collapsed.has(s)) STATE.collapsed.delete(s);
      else                        STATE.collapsed.add(s);
      saveCollapsed();
      render();
    });
  });
  $('rows').querySelectorAll('tr.row').forEach(tr => {
    tr.addEventListener('click', (e) => {
      // Don't toggle the row when the click came from inside the actions cell
      // or from a folder/BC link — those have their own handlers.
      if (e.target.closest('[data-stop]') || e.target.closest('a[data-act]')) return;
      const id = tr.dataset.id;
      if (STATE.open.has(id)) STATE.open.delete(id);
      else                    STATE.open.add(id);
      tr.classList.toggle('open');
      const sub = $('rows').querySelector(`tr.counts[data-counts-for="${id}"]`);
      if (sub) sub.classList.toggle('open');
    });
  });
  // Folder + BC project-name links use window.open: Chrome --app windows
  // silently swallow target="_blank" navigations from <a> tags, so we
  // intercept the click and call window.open() ourselves.
  $('rows').querySelectorAll('a[data-act="open-folder"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const fid = a.dataset.folderId;
      if (fid) window.open(`https://drive.google.com/drive/folders/${fid}`, '_blank', 'noopener,noreferrer');
    });
  });
  $('rows').querySelectorAll('a[data-act="open-bc"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const href = a.dataset.href;
      if (href) window.open(href, '_blank', 'noopener,noreferrer');
    });
  });
  $('rows').querySelectorAll('a[data-act="open-maps"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const href = a.dataset.href;
      if (href) window.open(href, '_blank', 'noopener,noreferrer');
    });
  });
  // Counts grid: toggle "Show all" / "Hide non-scope".
  $('rows').querySelectorAll('button[data-act="toggle-show-empty"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const grid = btn.closest('.counts-toolbar')?.nextElementSibling;
      if (!grid) return;
      const willShow = !grid.classList.contains('show-empty');
      grid.classList.toggle('show-empty', willShow);
      btn.classList.toggle('active', willShow);
      const empties = grid.querySelectorAll('.count-pill.empty').length;
      btn.textContent = willShow ? 'Hide non-scope' : `Show all (${empties})`;
    });
  });
  // Action buttons -- branched by data-act.
  $('rows').querySelectorAll('.row-actions button').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const act = btn.dataset.act, id = btn.dataset.id;
      btn.disabled = true; const orig = btn.innerHTML; btn.textContent = '…';
      try {
        if (act === 'extract-more') {
          await api('POST', '/api/bc/extraction/extract-more', { bcBidId: id });
          toast(`Deeper extraction queued for ${id.slice(0,8)}…`);
        } else if (act === 'accept') {
          await api('POST', '/api/bc/extraction/accept', { bcBidId: id });
          btn.innerHTML = '✓ accepted'; btn.classList.add('accepted');
          toast(`Extraction accepted for ${id.slice(0,8)}…`);
          setTimeout(load, 1500); return;
        } else if (act === 'pause-toggle') {
          const willBePaused = btn.dataset.paused !== '1';
          await api('POST', '/api/bc/extraction/pause', { bcBidId: id, paused: willBePaused });
          toast(`${willBePaused ? 'Paused' : 'Resumed'} extraction for ${id.slice(0,8)}…`);
          setTimeout(load, 800); return;
        } else if (act === 'project-details') {
          const r = (STATE.data.items || []).find(x => x.bcBidId === id);
          showProjectDetails(r);
        } else if (act === 'view-prop') {
          const resp = await api('GET', '/api/bc/proposal-folder?bcBidId=' + encodeURIComponent(id));
          if (resp && resp.url) window.open(resp.url, '_blank', 'noopener,noreferrer');
          else toast('No proposal folder yet for this RFP.', 4000);
        } else if (act === 'scan-addenda') {
          const r = (STATE.data.items || []).find(x => x.bcBidId === id);
          if (!r?.addendaSeen) {
            toast('No new addendum detected during the last BC scrape.', 3500);
          } else if (confirm('A new addendum was detected. Re-extract and move this job back to Accepted with an "Addendum-" name prefix?')) {
            await api('POST', '/api/bc/extraction/process-addendum', { bcBidId: id });
            toast('Addendum queued: re-extracting and moving to Accepted.', 4000);
            setTimeout(load, 1500); return;
          }
        }
      } catch (err) { toast(err.message, 4500); }
      finally      { btn.disabled = false; if (btn.textContent === '…') btn.innerHTML = orig; }
    });
  });

  // Auto-accept anything at >=90% confidence that hasn't been accepted yet.
  // Fires once per bcBidId per session; the next /leads-summary refresh will
  // see accepted=true and skip on subsequent renders.
  for (const r of STATE.data.items) {
    const c = r.extraction?.confidencePct;
    if (c == null || c < 90) continue;
    if (r.extraction?.accepted) continue;
    if (r.extractionPaused) continue;
    if (STATE.autoAccepted.has(r.bcBidId)) continue;
    STATE.autoAccepted.add(r.bcBidId);
    api('POST', '/api/bc/extraction/accept', { bcBidId: r.bcBidId })
      .then(() => toast(`Auto-accepted ${r.bcBidId.slice(0,8)}… at ${Math.round(c)}% confidence`))
      .catch(e => toast(`Auto-accept failed: ${e.message}`, 4500));
  }
}

// ===== Project Details modal (Undecided action) =====
function showProjectDetails(r) {
  if (!r) return;
  const m = $('modal');
  const trades = Array.isArray(r.trades) && r.trades.length
    ? r.trades.map(t => `<span class="scope-chip"><span class="ico">${tradeIcon(t)}</span>${safeHtml(t)}</span>`).join('')
    : '<span class="scope-chip unknown">scope: unknown</span>';
  const desc = r.description && r.description.trim()
    ? safeHtml(r.description)
    : '<em>No description scraped from BC yet. Force a detail rescan to populate.</em>';
  m.hidden = false;
  m.innerHTML = `<div class="modal-bg" data-close="1"><div class="modal" onclick="event.stopPropagation()">
    <button class="close" data-close="1">×</button>
    <h2>${safeHtml(projectLabel(r))}</h2>
    <div class="sub">${safeHtml(r.gc || 'unknown GC')} · ${safeHtml(r.location || 'no location')} · due ${safeHtml(r.dueAt || '—')}</div>
    <div class="meta-row">${trades}</div>
    <div class="body">${desc}</div>
  </div></div>`;
  m.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => { m.hidden = true; m.innerHTML = ''; }));
}

// ===== Processes tab =====
async function loadProcesses() {
  try {
    const data = await api('GET', '/api/admin/scheduled-tasks');
    const tasks = data.tasks || [];
    $('proc-count').textContent = tasks.length;
    const running = tasks.filter(t => (t.state || '').toLowerCase() === 'running').length;
    if (running > 0) { $('proc-running').textContent = running; $('proc-running-chip').style.display = ''; }
    else             { $('proc-running-chip').style.display = 'none'; }
    const stateBadge = (s) => {
      const v = (s || '').toLowerCase();
      if (v === 'ready')    return '<span class="status status-Accepted">Ready</span>';
      if (v === 'running')  return '<span class="status status-Won">Running</span>';
      if (v === 'disabled') return '<span class="status status-Archived">Paused</span>';
      return `<span class="status status-Unknown">${s || '?'}</span>`;
    };
    const html = tasks.map(t => {
      const isPaused  = (t.state || '').toLowerCase() === 'disabled';
      const isRunning = (t.state || '').toLowerCase() === 'running';
      return `<tr>
        <td><strong>${t.name}</strong>${t.description ? `<div class="small">${t.description}</div>` : ''}</td>
        <td>${stateBadge(t.state)}</td>
        <td class="small">${t.lastRunAt ? fmt(t.lastRunAt) : '<span class="pad">—</span>'}</td>
        <td class="small">${t.nextRunAt ? fmt(t.nextRunAt) : '<span class="pad">—</span>'}</td>
        <td class="small">${t.lastResultText || `<code>${t.lastResultCode ?? ''}</code>`}</td>
        <td>
          <div class="row-actions">
            <button data-task="${t.name}" data-act="run"     ${isRunning ? 'disabled' : ''}>${isRunning ? 'running' : 'Start'}</button>
            <button data-task="${t.name}" data-act="${isPaused ? 'enable' : 'disable'}">${isPaused ? 'Resume' : 'Pause'}</button>
          </div>
        </td>
      </tr>`;
    }).join('');
    $('proc-rows').innerHTML = html || `<tr><td colspan="6" style="text-align:center;color:var(--slate);padding:30px">No scheduled tasks discovered.</td></tr>`;
    // Wire buttons.
    $('proc-rows').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.task, act = btn.dataset.act;
        btn.disabled = true; const orig = btn.textContent; btn.textContent = '…';
        try {
          if (act === 'run') {
            await api('POST', '/api/admin/scheduled-tasks/run', { name });
            toast(`Started ${name}`);
          } else {
            await api('POST', '/api/admin/scheduled-tasks/toggle', { name, enable: act === 'enable' });
            toast(`${act === 'enable' ? 'Resumed' : 'Paused'} ${name}`);
          }
        } catch (e) { toast(e.message, 4500); }
        finally    { btn.disabled = false; btn.textContent = orig; loadProcesses(); }
      });
    });
  } catch (e) {
    $('proc-rows').innerHTML = `<tr><td colspan="6" style="padding:20px;color:var(--danger)">${e.message}</td></tr>`;
  }
}

// ===== Tab switching =====
$('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  $('tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const which = btn.dataset.tab;
  $('tab-leads').hidden     = (which !== 'leads');
  $('tab-processes').hidden = (which !== 'processes');
  $('rescan').style.display = (which === 'leads') ? '' : 'none';
  if (which === 'processes') loadProcesses();
});

$('rescan').addEventListener('click', async () => {
  const btn = $('rescan');
  btn.disabled = true;
  btn.textContent = 'firing...';
  try {
    const r = await api('POST', '/api/bc/rescan-now', {});
    toast(`Triggered ${r.triggered.length} scheduled tasks. Auto-refreshes every 30s.`, 4500);
  } catch (e) { toast(e.message, 5000); }
  finally {
    btn.disabled = false;
    btn.textContent = 'Rescan now';
  }
  setTimeout(load, 4000);
});

let refreshTimer = null;
function scheduleRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(load, 30000);
  $('auto').textContent = 'auto-refresh every 30s';
}

load();
scheduleRefresh();
</script>
