<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff · Prospects · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="/assets/favicon.ico" sizes="any" /><link rel="apple-touch-icon" href="/assets/img/gcc-logo-256.png" />
<link rel="stylesheet" href="/assets/css/site.css" />
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
.kpi { background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 18px; box-shadow: var(--shadow-xs); }
.kpi .lbl { font-size: 11px; font-weight: 700; color: var(--slate-light); letter-spacing: 0.06em; text-transform: uppercase; }
.kpi .val { font-size: 28px; font-weight: 800; color: var(--forest); margin-top: 4px; line-height: 1; font-family: var(--font-display); letter-spacing: -0.01em; }
.kpi .delta { font-size: 12px; color: var(--slate); margin-top: 4px; }
.tbl { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); overflow: hidden; font-size: 14px; }
.tbl th { text-align: left; padding: 10px 12px; background: var(--paper); font-size: 11px; font-weight: 700; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--hairline); }
.tbl td { padding: 10px 12px; border-top: 1px solid var(--hairline); }
.tbl tr:hover td { background: rgba(30,77,43,0.03); }
.tbl .actions a, .tbl .actions button { font-size: 12px; padding: 4px 8px; margin-right: 4px; background: white; border: 1px solid var(--hairline-strong); border-radius: 5px; cursor: pointer; color: var(--forest); text-decoration: none; }
.tbl .actions a:hover, .tbl .actions button:hover { background: var(--paper); border-color: var(--forest); }
.empty-state { background: white; border: 1px dashed var(--hairline-strong); border-radius: var(--r-md); padding: 40px 20px; text-align: center; color: var(--slate); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.status-pill { display: inline-block; padding: 2px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.status-new { background: rgba(212,175,55,0.18); color: var(--gold-dark); }
.status-contacted { background: rgba(74,85,104,0.18); color: var(--slate); }
.status-quoted { background: rgba(56,178,172,0.18); color: #2C7A7B; }
.status-won { background: rgba(72,187,120,0.18); color: #276749; }
.status-lost { background: rgba(245,101,101,0.18); color: #C53030; }
.status-spam { background: rgba(160,174,192,0.18); color: var(--slate-light); }
.status-active { background: rgba(72,187,120,0.18); color: #276749; }
.status-locked { background: rgba(245,101,101,0.18); color: #C53030; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.filter-bar .filter-pill { padding: 6px 14px; border: 1px solid var(--hairline-strong); border-radius: var(--r-pill); font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: var(--slate); }
.filter-bar .filter-pill.active { background: var(--forest); color: white; border-color: var(--forest-dark); }
.filter-bar .filter-pill:hover:not(.active) { background: var(--paper); }
</style>
</head>
<body>

<div id="gcc-header"></div>

<section style="padding: 28px 0; background: var(--paper); border-bottom: 1px solid var(--hairline);">
  <div class="container">
    <h1 style="margin-bottom: 4px;">Prospects</h1>
    <p style="color: var(--slate); margin: 0;">Qualified leads under active proposal/quote conversation.</p>
  </div>
</section>

<section style="padding: 28px 0;">
  <div class="container">
    <div id="page-loading" style="text-align:center; padding: 40px; color: var(--slate-light);">Loading...</div>
    <div id="page-content" hidden>
<div id="prospects-table">Loading...</div>
    </div>
  </div>
</section>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
<script src="/assets/js/page.js"></script>
<script>
gccPage.requireRole(["staff","admin"]).then(async (me) => {
  document.getElementById('page-loading').hidden = true;
  document.getElementById('page-content').hidden = false;
  try {
    const all = await Promise.all([
      fetch(gccApi.base + '/api/admin/leads?status=contacted', {credentials:'include'}).then(r => r.json()),
      fetch(gccApi.base + '/api/admin/leads?status=quoted', {credentials:'include'}).then(r => r.json())
    ]);
    const merged = [...all[0], ...all[1]].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    const target = document.getElementById('prospects-table');
    if (!merged.length) {
      target.innerHTML = '<div class="empty-state"><div class="es-icon">🎯</div><div>No active prospects.</div></div>';
    } else {
      const rows = merged.map(l => '<tr><td>' + gccPage.datetime(l.createdAt) + '</td><td><strong>' + (l.name || '--') + '</strong></td><td>' + (l.email || '') + '</td><td>' + (l.source || '') + '</td><td>' + (l.estimateMid ? gccPage.money(l.estimateMid) : '--') + '</td><td><span class="status-pill status-' + l.status + '">' + l.status + '</span></td></tr>').join('');
      target.innerHTML = '<table class="tbl"><thead><tr><th>Date</th><th>Contact</th><th>Email</th><th>Source</th><th>Estimate</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }
  } catch(e) { document.getElementById('prospects-table').innerHTML = '<div class="empty-state">Failed to load.</div>'; }
}).catch(() => { /* redirected */ });
</script>
</body>
</html>
