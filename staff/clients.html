<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff · Clients · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231E4D2B'/%3E%3Ctext x='50' y='65' font-family='Helvetica' font-size='42' font-weight='800' fill='white' text-anchor='middle'%3EGC%3C/text%3E%3Ccircle cx='86' cy='14' r='8' fill='%23D4AF37'/%3E%3C/svg%3E" type="image/svg+xml" />
<link rel="stylesheet" href="/assets/css/site.css" />
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi { background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 20px; box-shadow: var(--shadow-xs); }
.kpi .lbl { font-size: 12px; font-weight: 700; color: var(--slate-light); letter-spacing: 0.06em; text-transform: uppercase; }
.kpi .val { font-size: 28px; font-weight: 800; color: var(--forest); margin-top: 6px; line-height: 1; font-family: var(--font-display); letter-spacing: -0.01em; }
.kpi .delta { font-size: 12px; color: var(--slate); margin-top: 4px; }
.tbl { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); overflow: hidden; }
.tbl th { text-align: left; padding: 12px 14px; background: var(--paper); font-size: 12px; font-weight: 700; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--hairline); }
.tbl td { padding: 12px 14px; border-top: 1px solid var(--hairline); font-size: 14px; }
.tbl tr:hover td { background: rgba(30,77,43,0.03); }
.empty-state { background: white; border: 1px dashed var(--hairline-strong); border-radius: var(--r-md); padding: 40px 20px; text-align: center; color: var(--slate); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.coming-soon { display: inline-block; padding: 3px 10px; background: rgba(212,175,55,0.18); color: var(--gold-dark); border-radius: var(--r-pill); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--slate); margin-bottom: 4px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid var(--hairline-strong); border-radius: var(--r-sm); font-size: 15px; font-family: inherit; background: var(--paper); }
.field input:focus { outline: none; border-color: var(--forest); background: white; box-shadow: 0 0 0 3px rgba(30,77,43,0.15); }
</style>
</head>
<body>

<div id="gcc-header"></div>

<section style="padding: 32px 0; background: var(--paper);">
  <div class="container">
    <h1 style="margin-bottom: 4px;">Clients</h1>
    <p style="color: var(--slate); margin: 0;">Awarded projects — your active client roster.</p>
  </div>
</section>

<section style="padding: 32px 0;">
  <div class="container">
    <div id="page-loading" style="text-align:center; padding: 40px; color: var(--slate-light);">Loading...</div>
    <div id="page-content" hidden>
<div class="empty-state"><div class="es-icon">🚧</div><h3 style="color:var(--slate); margin-bottom:6px;">Clients module</h3><p style="margin:0;">Schema in place, UI scaffolds wire to the API in a follow-up. <span class="coming-soon">soon</span></p></div>
    </div>
  </div>
</section>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
<script src="/assets/js/page.js"></script>
<script>
gccPage.requireRole(["staff","admin"]).then(async (me) => {
  document.getElementById('page-loading').hidden = true;
  document.getElementById('page-content').hidden = false;

}).catch(() => { /* redirected */ });
</script>
</body>
</html>
