<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff · Clients · GCC LLC</title>
<meta name="theme-color" content="#1E4D2B" />
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231E4D2B'/%3E%3Ctext x='50' y='65' font-family='Helvetica' font-size='42' font-weight='800' fill='white' text-anchor='middle'%3EGC%3C/text%3E%3Ccircle cx='86' cy='14' r='8' fill='%23D4AF37'/%3E%3C/svg%3E" type="image/svg+xml" />
<link rel="stylesheet" href="/assets/css/site.css" />
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
.kpi { background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 18px; box-shadow: var(--shadow-xs); }
.kpi .lbl { font-size: 11px; font-weight: 700; color: var(--slate-light); letter-spacing: 0.06em; text-transform: uppercase; }
.kpi .val { font-size: 28px; font-weight: 800; color: var(--forest); margin-top: 4px; line-height: 1; font-family: var(--font-display); letter-spacing: -0.01em; }
.tbl { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--hairline); border-radius: var(--r-md); overflow: hidden; font-size: 14px; }
.tbl th { text-align: left; padding: 10px 12px; background: var(--paper); font-size: 11px; font-weight: 700; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--hairline); }
.tbl td { padding: 10px 12px; border-top: 1px solid var(--hairline); }
.tbl tr:hover td { background: rgba(30,77,43,0.03); }
.tbl .actions a, .tbl .actions button { font-size: 12px; padding: 4px 8px; margin-right: 4px; background: white; border: 1px solid var(--hairline-strong); border-radius: 5px; cursor: pointer; color: var(--forest); text-decoration: none; }
.tbl .actions a:hover, .tbl .actions button:hover { background: var(--paper); border-color: var(--forest); }
.empty-state { background: white; border: 1px dashed var(--hairline-strong); border-radius: var(--r-md); padding: 40px 20px; text-align: center; color: var(--slate); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.status-pill { display: inline-block; padding: 2px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.status-active { background: rgba(72,187,120,0.18); color: #276749; }
.status-locked { background: rgba(245,101,101,0.18); color: #C53030; }
.status-deleted { background: rgba(160,174,192,0.18); color: var(--slate-light); }
.status-client { background: rgba(74,85,104,0.18); color: var(--slate); }
.status-staff { background: rgba(56,178,172,0.18); color: #2C7A7B; }
.status-admin { background: rgba(212,175,55,0.22); color: var(--gold-dark); }
.inline-select { padding: 4px 8px; border: 1px solid var(--hairline-strong); border-radius: 5px; font-size: 12px; background: white; font-family: inherit; }
</style>
</head>
<body>

<div id="gcc-header"></div>

<section style="padding: 28px 0; background: var(--paper); border-bottom: 1px solid var(--hairline);">
  <div class="container">
    <h1 style="margin-bottom: 4px;">Clients</h1>
    <p style="color: var(--slate); margin: 0;">All registered portal users. Admins can change role/status.</p>
  </div>
</section>

<section style="padding: 28px 0;">
  <div class="container">
    <div id="page-loading" style="text-align:center; padding: 40px; color: var(--slate-light);">Loading...</div>
    <div id="page-content" hidden>
<div id="clients-table">Loading...</div>
    </div>
  </div>
</section>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/header.js"></script>
<script src="/assets/js/page.js"></script>
<script>
gccPage.requireRole(["staff","admin"]).then(async (me) => {
  document.getElementById('page-loading').hidden = true;
  document.getElementById('page-content').hidden = false;
  const isAdmin = me.role === 'admin';
  try {
    const cs = await fetch(gccApi.base + '/api/admin/clients', {credentials:'include'}).then(r => r.json());
    const target = document.getElementById('clients-table');
    if (!cs.length) {
      target.innerHTML = '<div class="empty-state">No clients yet.</div>';
      return;
    }
    const rows = cs.map(c => {
      const roleCell = isAdmin
        ? '<select class="inline-select role-sel" data-id="' + c.id + '">' +
            ['client','staff','admin'].map(r => '<option value="' + r + '"' + (r === c.role ? ' selected' : '') + '>' + r + '</option>').join('') +
          '</select>'
        : '<span class="status-pill status-' + c.role + '">' + c.role + '</span>';
      const statusCell = isAdmin && c.id !== me.id
        ? '<select class="inline-select status-sel" data-id="' + c.id + '">' +
            ['active','locked','deleted'].map(s => '<option value="' + s + '"' + (s === c.status ? ' selected' : '') + '>' + s + '</option>').join('') +
          '</select>'
        : '<span class="status-pill status-' + c.status + '">' + c.status + '</span>';
      return '<tr>' +
        '<td>' + gccPage.datetime(c.createdAt) + '</td>' +
        '<td><strong>' + (c.name || c.email) + '</strong>' + (c.company ? '<br><span style="color:var(--slate); font-size:12px;">' + c.company + '</span>' : '') + '</td>' +
        '<td>' + c.email + '</td>' +
        '<td>' + roleCell + '</td>' +
        '<td>' + statusCell + '</td>' +
        '<td>' + c.clientType + '</td>' +
        '<td>' + c.estimateCount + '</td>' +
        '<td>' + (c.lastSignInAt ? gccPage.datetime(c.lastSignInAt) : 'never') + '</td>' +
      '</tr>';
    }).join('');
    target.innerHTML = '<table class="tbl"><thead><tr><th>Joined</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Type</th><th>Ests</th><th>Last in</th></tr></thead><tbody>' + rows + '</tbody></table>';
    async function updateClient(id, patch) {
      const r = await fetch(gccApi.base + '/api/admin/clients/' + id, {
        method:'PUT', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(patch)
      });
      if (!r.ok) alert('Update failed: HTTP ' + r.status);
    }
    target.querySelectorAll('.role-sel').forEach(s => s.addEventListener('change', e => updateClient(s.dataset.id, { Role: e.target.value })));
    target.querySelectorAll('.status-sel').forEach(s => s.addEventListener('change', e => updateClient(s.dataset.id, { Status: e.target.value })));
  } catch(e) { document.getElementById('clients-table').innerHTML = '<div class="empty-state">Failed to load.</div>'; }
}).catch(() => { /* redirected */ });
</script>
</body>
</html>
