services:
  postgres:
    image: postgres:16-alpine
    container_name: calc_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calc_dev}
      POSTGRES_DB: ${POSTGRES_DB:-calc_app}
    ports:
      - "5432:5432"
    volumes:
      - calc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-calc}", "-d", "${POSTGRES_DB:-calc_app}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  calc_pgdata:
