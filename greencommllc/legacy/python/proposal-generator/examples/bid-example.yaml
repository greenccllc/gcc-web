# Example: Formal Bid — public-work GC project
# Based on the William Chrisman HS pattern from Prior Work References

proposal_type: formal-bid
proposal_no:   GCC-2026-0101
issue_date:    2026-04-20
validity_days: 60                         # RFP required pricing held 60 days

client:
  name:    Straub Construction Co.
  contact: Alan Brooks
  title:   Senior Project Manager
  email:   abrooks@straubconstruction.com
  phone:   "+1 913 555 0142"
  address:
    street: 8725 Rosehill Rd.
    city:   Lenexa
    state:  KS
    zip:    "66215"
  is_repeat_client:    false
  prior_project_refs:  []

project:
  name: William Chrisman High School — 2026 Renovations · Low-Voltage Package
  address:
    street: 1223 N Noland Rd.
    city:   Independence
    state:  MO
    zip:    "64050"
  description: |
    Independence School District is renovating two academic wings and the
    competition gym at William Chrisman High School during the 2026 summer
    window. GCC's scope is the low-voltage package — structured cabling,
    IP video distribution, and access-control rough-in — per bid
    documents dated 2026-03-12.
  vertical:       k-12
  is_public_work: true
  bid_due_date:   2026-05-08
  bid_number:     "ISD-2026-014"
  target_start:   2026-06-09
  target_finish:  2026-08-15

scope_lines:
  - category:    cabling
    qty:         480
    unit:        ea
    description: Cat6A plenum data drops — classroom and admin outlets (spec calls for Cat6; we install Cat6A at no upcharge)
    unit_price:  86.50
    line_total:  41520.00

  - category:    cabling
    qty:         6
    unit:        ls
    description: MDF / IDF rack buildout — 6 closets, 45U racks with cable management and vertical runway
    unit_price:  15200.00
    line_total:  91200.00

  - category:    fiber
    qty:         6
    unit:        ls
    description: Inter-closet fiber backbone — 12-strand OS2 single-mode between MDF and 5 IDFs
    unit_price:  6200.00
    line_total:  37200.00

  - category:    cctv
    qty:         42
    unit:        ea
    description: IP CCTV camera rough-in — Cat6A home-run from each camera location to nearest IDF, terminated both ends (cameras by others)
    unit_price:  215.00
    line_total:  9030.00

  - category:    access
    qty:         18
    unit:        ea
    description: Access-control rough-in — door position switch, REX, reader cable, strike cable to door, terminated at IDF (hardware by security integrator)
    unit_price:  485.00
    line_total:  8730.00

  - category:    labor
    qty:         1
    unit:        ls
    description: Fluke DSX-8000 certification testing — all data and fiber; LinkWare PDF at closeout
    unit_price:  4200.00
    line_total:  4200.00

alternates:
  - name:        "Managed Services — Monthly"
    monthly:     985.00
    annual:      11820.00
    description: |
      Monitoring & remote support, 20 hr/quarter MAC labor allowance,
      warranty administration, on-site response (standard: 4-hr with
      drive-time billed T&M; after-hours available).

exclusions:
  standard_excluded_auto: true
  extra:
    - Any speaker, paging, or classroom audio system
    - Clock & bell system (existing to remain; GCC will not modify)
    - Owner-furnished equipment installation beyond terminate-and-test
    - Core drilling or saw cutting of existing concrete
    - After-hours or weekend labor unless pre-approved at 1.5×

loyalty_discount_pct: 0

value_engineering: []

notes:
  - Public-work project — include prevailing-wage compliance statement.
  - 10-week summer window is the schedule-critical constraint; all work
    must be complete before 2026-08-17 student return.
  - Owner's IT asked for LinkWare PDF as part of closeout (already our
    standard — confirm inclusion).
  - GC wants bid in their form format with our scope attached.

prepared_by:
  name:  Nathan Morris
  title: CTO
  email: nmorris@greencommllc.com
  phone: "636-224-8192"

approved_by:
  name:  Kaitlyn Lim Morris
  title: CEO

terms:
  payment: "Net 30 from invoice, per General Contract terms"
  deposit: "Per GC payment schedule"
  change_order_policy: "Any scope change documented via CO, priced T&M or lump-sum"
  insurance: "GL $2M · Auto $1M · WC $1M. COI with ISD and Straub named as additional insureds on request."
  licensure: "Licensed in MO; prevailing-wage compliant."
