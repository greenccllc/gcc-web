# Example: Change Order — added scope on existing MOCSA-style project

proposal_type: change-order
proposal_no:   GCC-2026-0104-CO-001
issue_date:    2026-04-20
validity_days: 14                         # CO windows tighter than fresh bids

client:
  name:    MOCSA
  contact: Dawn Richardson
  title:   Director of Operations
  email:   drichardson@mocsa.org
  phone:   "+1 816 555 0422"
  address:
    street: 3100 Broadway Blvd.
    city:   Kansas City
    state:  MO
    zip:    "64111"
  is_repeat_client: true
  prior_project_refs:
    - "MOCSA Secure Facility Build (GCC-2026-0050)"

project:
  name: MOCSA Secure Facility Build — CO-001 · Added Access Points
  address:
    street: 3100 Broadway Blvd.
    city:   Kansas City
    state:  MO
    zip:    "64111"
  description: |
    Original scope included 42 access-controlled doors. Facilities
    identified 4 additional interior doors during pre-install walkdown
    that should be brought onto the same access system for programmatic
    consistency. This change order adds rough-in and head-end work for
    those 4 doors.
  vertical:       nonprofit
  is_public_work: false

scope_lines:
  - category:    access
    qty:         4
    unit:        ea
    description: Access-control rough-in on added doors — door position switch, REX, reader cable, strike cable, terminated at IDF-2
    unit_price:  485.00
    line_total:  1940.00

  - category:    access
    qty:         4
    unit:        ea
    description: Device-level labor — reader mount, strike install, door-position calibration (hardware consistent w/ original scope, Genetec Synergis)
    unit_price:  285.00
    line_total:  1140.00

  - category:    labor
    qty:         1
    unit:        ls
    description: Head-end programming — 4 doors added to access groups, credentialing updated, audit log test
    unit_price:  420.00
    line_total:  420.00

alternates: []                            # MSP already in place under original

exclusions:
  standard_excluded_auto: false           # carry exclusions from original PO
  extra:
    - All exclusions from original project (GCC-2026-0050) remain in force

loyalty_discount_pct: 0                   # CO doesn't stack with loyalty

notes:
  - Hardware is consistent with original Genetec Synergis deployment.
  - No schedule impact — additional doors will be completed during the
    same mobilization as the original commissioning window.

prepared_by:
  name:  Nathan Morris
  title: CTO
  email: nmorris@greencommllc.com
  phone: "636-224-8192"

approved_by: null

terms:
  payment: "Per original project payment terms"
  deposit: "Waived for CO"
  change_order_policy: "This document supersedes the original scope only for the added items listed; balance of original scope remains in force."
  insurance: "Per original project."
  licensure: "Per original project."

change_order:
  co_number:            "CO-001"
  original_proposal:    "GCC-2026-0050"
  original_contract:    64520.00          # original contract total
  schedule_impact_days: 0
  reason: |
    Facilities identified 4 interior doors during pre-install walkdown
    that should be brought onto the same access system for programmatic
    consistency. Adding these during mobilization is the least-disruptive
    option; doing them as a follow-on would require a second trip and
    separate commissioning window.
