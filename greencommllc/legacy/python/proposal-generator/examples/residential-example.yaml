  phone: "636-224-8192"

approved_by: null

terms:
  payment: "50% on mobilization, balance at trim-out completion"
  deposit: "50% mobilization deposit"
  change_order_policy: "Any scope change documented via CO, priced T&M or lump-sum"
  insurance: "GL $2M · Auto $1M · WC $1M."
  licensure: "Licensed & insured in MO and KS."
