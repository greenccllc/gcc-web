# Example: Residential Quote — custom new-construction pre-wire

proposal_type: residential-quote
proposal_no:   GCC-2026-0103
issue_date:    2026-04-20
validity_days: 30

client:
  name:    Emily & James Hartwell
  contact: James Hartwell
  email:   james.hartwell@example.com
  phone:   "+1 816 555 0307"
  address:
    street: 2418 Oak Bluff Dr.
    city:   Leawood
    state:  KS
    zip:    "66211"
  is_repeat_client: false
  prior_project_refs: []

project:
  name: Hartwell Residence — Pre-Wire & Smart Home Infrastructure
  address:
    street: 2418 Oak Bluff Dr.
    city:   Leawood
    state:  KS
    zip:    "66211"
  description: |
    New-construction single-family home. Pre-drywall low-voltage wiring
    for data, video, audio zones, and security rough-in. Structured media
    panel in the mechanical room. WiFi coverage designed for the finished
    square footage plus upper-deck outdoor area.
  vertical:       residential
  is_public_work: false
  target_start:   2026-05-12
  target_finish:  2026-05-16

scope_lines:
  - category:    cabling
    qty:         32
    unit:        ea
    description: Cat6A plenum data drops — one per room, two in great room, two in office, two in master
    unit_price:  72.00
    line_total:  2304.00

  - category:    cabling
    qty:         8
    unit:        ea
    description: Coax RG-6 drops for TV locations (great room, master, bonus, office, two guest, kitchen, lanai)
    unit_price:  54.00
    line_total:  432.00

  - category:    cabling
    qty:         12
    unit:        ea
    description: In-ceiling audio pre-wire — living areas and master bath (speakers by others)
    unit_price:  65.00
    line_total:  780.00

  - category:    network
    qty:         1
    unit:        ls
    description: Structured media panel — 42" hinged, 42U equivalent, ventilated; terminated patch panel + switch shelf
    unit_price:  1280.00
    line_total:  1280.00

  - category:    network
    qty:         4
    unit:        ea
    description: WiFi access point rough-in — ceiling-mount locations engineered for full coverage incl. upper deck
    unit_price:  145.00
    line_total:  580.00

  - category:    access
    qty:         1
    unit:        ls
    description: Security rough-in — door / window / motion pre-wire to panel location (alarm panel and devices by alarm company)
    unit_price:  685.00
    line_total:  685.00

  - category:    labor
    qty:         1
    unit:        ls
    description: Fluke DSX-8000 certification of all data and fiber; LinkWare PDF at completion
    unit_price:  385.00
    line_total:  385.00

alternates:
  - name:        "Managed Services — Monthly"
    monthly:     95.00
    annual:      1140.00
    description: |
      Remote WiFi monitoring, firmware updates, configuration backups,
      and 1 hr/month MAC labor for adding / moving devices. On-site
      response available at standard T&M.

exclusions:
  standard_excluded_auto: true
  extra:
    - Televisions, speakers, and AV equipment (client-supplied)
    - Alarm panel programming and monitoring contract
    - In-wall HDMI or fiber runs for long-distance video (available as add-on)
    - Drywall patching or repairs (coordinate with general contractor)

loyalty_discount_pct: 0

notes:
  - Pre-drywall window is tight — 4 business days on site.
  - Client is building custom with Hamilton Homes; GC is aware of GCC scope.
  - Family cares about whole-home WiFi more than structured cabling count;
    lead with the coverage design in the narrative.

