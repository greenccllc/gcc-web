name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        env:
          # We don't run the Electron desktop app in CI — skip the heavy
          # binary download to avoid flaky postinstall failures.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: Test (proposal)
        run: npm test -w apps/proposal

      - name: Type check (proposal)
        run: npm -w apps/proposal run check

      - name: Type check (calculator)
        run: npm -w apps/calculator run typecheck

      - name: Build (web-client)
        run: npm -w apps/web-client run build

      - name: Build (proposal)
        run: npm -w apps/proposal run build
